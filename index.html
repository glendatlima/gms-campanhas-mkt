<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GMS — Análise de Campanhas</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#10293F;--navy-hover:#1a3d5c;--cyan:#45E5E5;--cyan-hover:#2ecece;--cyan-light:#E8F9F9;--yellow:#FFB800;--white:#FFF;--bg:#F8FAFC;--g100:#F5F5F5;--g200:#E5E5E5;--g300:#CCC;--g500:#666;--g700:#444;--g900:#333;--error:#DC2626;--error-bg:#FEF2F2;--success:#16A34A;--success-bg:#F0FDF4;--info:#2563EB;--info-bg:#EFF6FF;--purple:#7C3AED;--orange:#EA580C;--pink:#DB2777;--emerald:#059669;--sh:0 1px 3px rgba(16,41,63,.08);--sh-lg:0 4px 12px rgba(16,41,63,.12)}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--g900);min-height:100vh}
.icon{font-family:'Material Symbols Rounded';font-size:20px;font-style:normal;line-height:1;user-select:none;vertical-align:middle}
.icon-sm{font-size:16px}.icon-lg{font-size:24px}

/* Topbar */
.topbar{height:52px;background:var(--navy);display:flex;align-items:center;padding:0 20px;gap:16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(16,41,63,.15)}
.tb-logo{display:flex;align-items:center;gap:8px;flex-shrink:0}
.tb-mark{background:var(--cyan);color:var(--navy);font-weight:700;font-size:13px;padding:3px 7px;border-radius:4px}
.tb-text{color:#fff;font-size:13px;opacity:.9}
.tb-bc{flex:1;font-size:13px;color:rgba(255,255,255,.55);display:flex;align-items:center;gap:4px}
.tb-bc .a{color:#fff;font-weight:500}
.tb-status{font-size:11px;color:rgba(255,255,255,.5)}

/* Container */
.container{max-width:1200px;margin:0 auto;padding:24px 20px}

/* Cards */
.card{background:var(--white);border-radius:8px;box-shadow:var(--sh);border:1px solid var(--g200);transition:box-shadow .2s,transform .2s}
.card:hover{box-shadow:var(--sh-lg)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:6px;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:all .15s;font-family:inherit}
.btn-primary{background:var(--cyan);color:var(--navy)}.btn-primary:hover{background:var(--cyan-hover)}
.btn-navy{background:var(--navy);color:#fff}.btn-navy:hover{background:var(--navy-hover)}
.btn-outline{background:transparent;border:1px solid var(--g300);color:var(--g700)}.btn-outline:hover{border-color:var(--cyan);color:var(--navy)}
.btn-danger{background:transparent;border:1px solid var(--error);color:var(--error)}.btn-danger:hover{background:var(--error-bg)}
.btn-sm{padding:5px 12px;font-size:11px}
.btn-icon{padding:6px;min-width:32px;min-height:32px;justify-content:center}

/* Inputs */
input,select,textarea{width:100%;padding:8px 12px;border-radius:6px;border:1px solid var(--g300);font-size:13px;font-family:inherit;outline:none;transition:border .15s}
input:focus,select:focus,textarea:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(69,229,229,.15)}
select{cursor:pointer}
textarea{resize:vertical;min-height:60px}
label{font-size:11px;color:var(--g500);font-weight:500;margin-bottom:3px;display:block}

/* Badge */
.badge{display:inline-flex;padding:2px 8px;border-radius:9999px;font-size:10px;font-weight:600}
.badge-success{background:var(--success-bg);color:var(--success);border:1px solid rgba(22,163,74,.3)}
.badge-warning{background:#FFFBEB;color:#92400E;border:1px solid rgba(255,184,0,.5)}
.badge-error{background:var(--error-bg);color:var(--error);border:1px solid rgba(220,38,38,.3)}
.badge-info{background:var(--info-bg);color:var(--info);border:1px solid rgba(37,99,235,.3)}
.badge-purple{background:#F5F3FF;color:var(--purple);border:1px solid rgba(124,58,237,.3)}

/* Tabs */
.tabs{display:flex;gap:0;border-bottom:2px solid var(--g200);margin:20px 0}
.tab{padding:10px 18px;font-size:13px;font-weight:400;color:var(--g500);background:0;border:0;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;font-family:inherit;transition:all .15s}
.tab.active{color:var(--navy);font-weight:600;border-bottom-color:var(--cyan)}
.tab:hover{color:var(--navy)}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px}
.kpi{padding:14px 16px;border-top:3px solid var(--navy)}
.kpi-label{font-size:10px;color:var(--g500);margin-bottom:4px;font-weight:500}
.kpi-value{font-size:22px;font-weight:700;color:var(--navy);line-height:1}
.kpi-sub{font-size:10px;font-weight:600;margin-top:3px}

/* Grid */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:768px){.grid-2,.grid-3{grid-template-columns:1fr}}

/* Section title */
.section-title{font-size:14px;font-weight:600;color:var(--navy);margin-bottom:14px;font-family:'Poppins',sans-serif}
.section-divider{font-size:11px;color:var(--g500);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin:14px 0 8px;padding:8px 0;border-bottom:1px dashed var(--g200)}

/* Metrics */
.mcell{text-align:center;padding:6px 4px;border-radius:6px;background:var(--bg)}
.mcell-l{font-size:9px;color:var(--g500);margin-bottom:2px}
.mcell-v{font-size:16px;font-weight:700}
.mcell-s{font-size:9px;font-weight:600}

/* Links */
.link-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;background:var(--bg);border:1px solid var(--g200)}
.link-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* Progress */
.prog-track{height:4px;border-radius:2px;background:var(--g200)}
.prog-fill{height:100%;border-radius:2px;transition:width .4s}

/* Insight */
.insight{padding:8px 12px;border-radius:6px;margin-bottom:6px}
.insight p{font-size:11px;margin:0;font-weight:500}

/* Best card */
.best-card{background:linear-gradient(135deg,#10293F,#1a3d5c);border-radius:10px;padding:20px;color:#fff;position:relative;overflow:hidden;margin:16px 0}

/* Modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(16,41,63,.5);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--white);border-radius:12px;width:90%;max-width:600px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(16,41,63,.3);transform:scale(.95);transition:transform .2s}
.modal-overlay.open .modal{transform:scale(1)}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--g200);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--white);z-index:1;border-radius:12px 12px 0 0}
.modal-header h2{font-size:16px;font-weight:600;color:var(--navy);font-family:'Poppins',sans-serif}
.modal-body{padding:20px}
.modal-footer{padding:12px 20px;border-top:1px solid var(--g200);display:flex;gap:8px;justify-content:flex-end}

/* Campaign card */
.camp-card{padding:20px;cursor:pointer;border-left:4px solid var(--cyan);transition:all .2s}
.camp-card:hover{transform:translateY(-2px);box-shadow:var(--sh-lg)}
.camp-card .camp-name{font-size:16px;font-weight:600;color:var(--navy);font-family:'Poppins',sans-serif}
.camp-card .camp-desc{font-size:12px;color:var(--g500);margin-top:4px}
.camp-card .camp-meta{display:flex;gap:12px;margin-top:10px;font-size:11px;color:var(--g700)}

/* Email card */
.email-card{border-left:4px solid var(--success);overflow:hidden;margin-bottom:12px}
.email-card.pend{border-left-color:var(--yellow)}

/* Empty state */
.empty{padding:40px;text-align:center;color:var(--g500)}
.empty .icon{font-size:48px;color:var(--g300);display:block;margin-bottom:12px}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:var(--navy);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;box-shadow:0 4px 12px rgba(16,41,63,.3);opacity:0;transition:opacity .3s;pointer-events:none;z-index:300}
.toast.show{opacity:1}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;padding:60px}
.spinner{width:36px;height:36px;border:3px solid var(--g200);border-top-color:var(--cyan);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Footer */
.footer{margin-top:32px;padding-top:16px;border-top:1px solid var(--g200);text-align:center}
.footer p{font-size:10px;color:var(--g500)}
</style>
</head>
<body>

<header class="topbar">
  <div class="tb-logo"><span class="tb-mark">GMS</span><span class="tb-text">Gestão Mais Simples</span></div>
  <nav class="tb-bc" id="breadcrumb"><span class="a">Campanhas de Marketing</span></nav>
  <span class="tb-status" id="save-status"></span>
</header>

<div class="container" id="app">
  <div class="loading"><div class="spinner"></div></div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header"><h2 id="modal-title">Modal</h2><button class="btn btn-icon btn-outline" onclick="closeModal()"><span class="icon icon-sm">close</span></button></div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===================== SUPABASE =====================
const SUPABASE_URL = 'https://rziulhxiwgjcizieqcae.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ6aXVsaHhpd2dqY2l6aWVxY2FlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MDM5OTksImV4cCI6MjA5MDQ3OTk5OX0.UeOfPqM6Gn1zTsnV6WmsNO8uCtdnjux3gEqwUrM2DBM';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ===================== STATE =====================
let currentView = 'campaigns'; // campaigns | campaign-detail
let currentCampaign = null;
let currentTab = 'emails';
let campaigns = [];
let emails = [];
let whatsapps = [];
let socials = [];

// ===================== HELPERS =====================
const pc = (n,d) => d>0?(n/d*100).toFixed(1):'0.0';
const fmt = n => (n||0).toLocaleString('pt-BR');
const $ = id => document.getElementById(id);

function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window._tt);
  window._tt = setTimeout(() => t.classList.remove('show'), 2000);
}

function openModal(title, bodyHtml, footerHtml) {
  $('modal-title').textContent = title;
  $('modal-body').innerHTML = bodyHtml;
  $('modal-footer').innerHTML = footerHtml;
  $('modal-overlay').classList.add('open');
}
function closeModal() { $('modal-overlay').classList.remove('open'); }

function setBreadcrumb(parts) {
  $('breadcrumb').innerHTML = parts.map((p, i) => 
    i < parts.length - 1 
      ? `<span style="cursor:pointer" onclick="${p.action}">${p.label}</span><span style="opacity:.4">›</span>` 
      : `<span class="a">${p.label}</span>`
  ).join('');
}

// ===================== DATA =====================
async function loadCampaigns() {
  const { data, error } = await sb.from('campanhas').select('*').order('created_at', { ascending: false });
  if (error) { toast('Erro ao carregar campanhas'); console.error(error); return; }
  campaigns = data || [];
}

async function loadCampaignData(campId) {
  const [e, w, s] = await Promise.all([
    sb.from('emails_campanha').select('*').eq('campanha_id', campId).order('ordem'),
    sb.from('whatsapp_campanha').select('*').eq('campanha_id', campId).order('created_at'),
    sb.from('social_campanha').select('*').eq('campanha_id', campId).order('data_publicacao', { ascending: false }),
  ]);
  emails = e.data || [];
  whatsapps = w.data || [];
  socials = s.data || [];
}

// ===================== RENDER: CAMPAIGNS LIST =====================
function renderCampaignsList() {
  currentView = 'campaigns';
  currentCampaign = null;
  setBreadcrumb([{ label: 'Campanhas de Marketing' }]);

  let h = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
    <div><h1 style="font-size:22px;font-weight:700;color:var(--navy);font-family:'Poppins',sans-serif;margin:0">📊 Campanhas de Marketing</h1>
    <p style="font-size:13px;color:var(--g500);margin-top:4px">${campaigns.length} campanha(s) cadastrada(s)</p></div>
    <button class="btn btn-primary" onclick="openNewCampaignModal()"><span class="icon icon-sm">add</span> Nova Campanha</button>
  </div>`;

  if (campaigns.length === 0) {
    h += `<div class="card empty"><span class="icon">campaign</span><p style="font-size:14px;font-weight:500;margin-bottom:8px">Nenhuma campanha ainda</p><p style="font-size:12px">Clique em "Nova Campanha" para começar</p></div>`;
  } else {
    campaigns.forEach(c => {
      const stBadge = c.status === 'ativa' ? 'badge-success' : c.status === 'concluida' ? 'badge-info' : c.status === 'pausada' ? 'badge-warning' : 'badge-purple';
      const stLabel = { ativa:'Ativa', concluida:'Concluída', pausada:'Pausada', rascunho:'Rascunho' }[c.status] || c.status;
      h += `<div class="card camp-card" onclick="openCampaign('${c.id}')" style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <div class="camp-name">${c.nome}</div>
            ${c.descricao ? `<div class="camp-desc">${c.descricao}</div>` : ''}
            <div class="camp-meta">
              ${c.data_inicio ? `<span>📅 ${c.data_inicio} → ${c.data_fim || '...'}</span>` : ''}
              <span class="badge ${stBadge}">${stLabel}</span>
            </div>
          </div>
          <div style="display:flex;gap:4px" onclick="event.stopPropagation()">
            <button class="btn btn-icon btn-outline btn-sm" onclick="openEditCampaignModal('${c.id}')" title="Editar"><span class="icon icon-sm">edit</span></button>
            <button class="btn btn-icon btn-danger btn-sm" onclick="deleteCampaign('${c.id}')" title="Excluir"><span class="icon icon-sm">delete</span></button>
          </div>
        </div>
      </div>`;
    });
  }

  h += `<div class="footer"><p>© 2026 Sismais Tecnologia · GMS — Gestão Mais Simples</p></div>`;
  $('app').innerHTML = h;
}

// ===================== RENDER: CAMPAIGN DETAIL =====================
async function openCampaign(id) {
  $('app').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  currentCampaign = campaigns.find(c => c.id === id);
  await loadCampaignData(id);
  currentView = 'campaign-detail';
  currentTab = 'emails';
  renderCampaignDetail();
}

function renderCampaignDetail() {
  const c = currentCampaign;
  setBreadcrumb([
    { label: 'Campanhas', action: "goBack()" },
    { label: c.nome }
  ]);

  let h = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
    <div>
      <button class="btn btn-outline btn-sm" onclick="goBack()" style="margin-bottom:8px"><span class="icon icon-sm">arrow_back</span> Voltar</button>
      <h1 style="font-size:20px;font-weight:700;color:var(--navy);font-family:'Poppins',sans-serif;margin:0">${c.nome}</h1>
      ${c.descricao ? `<p style="font-size:12px;color:var(--g500);margin-top:4px">${c.descricao}</p>` : ''}
    </div>
  </div>`;

  // Tabs
  h += `<div class="tabs">
    <button class="tab ${currentTab==='emails'?'active':''}" onclick="switchCampTab('emails')">📧 E-mails (${emails.length})</button>
    <button class="tab ${currentTab==='whatsapp'?'active':''}" onclick="switchCampTab('whatsapp')">📱 WhatsApp (${whatsapps.length})</button>
    <button class="tab ${currentTab==='social'?'active':''}" onclick="switchCampTab('social')">📸 Redes Sociais (${socials.length})</button>
  </div>`;

  if (currentTab === 'emails') h += renderEmailsTab();
  else if (currentTab === 'whatsapp') h += renderWhatsappTab();
  else if (currentTab === 'social') h += renderSocialTab();

  h += `<div class="footer"><p>© 2026 Sismais Tecnologia · GMS — Gestão Mais Simples</p></div>`;
  $('app').innerHTML = h;
}

function switchCampTab(tab) { currentTab = tab; renderCampaignDetail(); }
function goBack() { renderCampaignsList(); }

// ===================== EMAILS TAB =====================
function renderEmailsTab() {
  const tot = { env:0,ab:0,cl:0,clV:0,clD:0,clM:0,bo:0,un:0,ve:0 };
  emails.forEach(e => { tot.env+=e.enviados; tot.ab+=e.aberturas; tot.cl+=e.cliques; tot.clV+=e.cliques_venda; tot.clD+=e.cliques_desins; tot.clM+=e.cliques_midia; tot.bo+=e.bounces; tot.un+=e.unsubs; tot.ve+=e.vendas; });

  let h = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <div class="section-title" style="margin:0">Visão Geral dos E-mails</div>
    <button class="btn btn-primary btn-sm" onclick="openNewEmailModal()"><span class="icon icon-sm">add</span> Novo E-mail</button>
  </div>`;

  // KPIs
  h += '<div class="kpi-grid">';
  [
    {l:'Enviados',v:tot.env,i:'📤',c:'var(--info)'},
    {l:'Aberturas',v:tot.ab,s:pc(tot.ab,tot.env)+'%',i:'👁️',c:'var(--cyan)'},
    {l:'Cliques',v:tot.cl,s:pc(tot.cl,tot.ab)+'%',i:'🖱️',c:'var(--purple)'},
    {l:'Cl. Venda',v:tot.clV,s:tot.cl>0?pc(tot.clV,tot.cl)+'%':'',i:'🛒',c:'var(--success)'},
    {l:'Cl. Mídia',v:tot.clM,s:tot.cl>0?pc(tot.clM,tot.cl)+'%':'',i:'🎬',c:'var(--pink)'},
    {l:'Vendas',v:tot.ve,s:tot.clV>0?pc(tot.ve,tot.clV)+'% conv':'',i:'💰',c:'var(--emerald)'},
    {l:'Bounces',v:tot.bo,s:pc(tot.bo,tot.env)+'%',i:'⚠️',c:'var(--yellow)'},
    {l:'Descadastros',v:tot.un,i:'🚫',c:'var(--error)'},
  ].forEach(k => {
    h += `<div class="card kpi" style="border-top-color:${k.c}"><div class="kpi-label">${k.i} ${k.l}</div><div class="kpi-value">${fmt(k.v)}</div>${k.s?`<div class="kpi-sub" style="color:${k.c}">${k.s}</div>`:''}</div>`;
  });
  h += '</div>';

  // Per email
  h += '<div style="margin-top:20px">';
  if (emails.length === 0) {
    h += '<div class="card empty"><span class="icon">email</span><p>Nenhum e-mail cadastrado</p></div>';
  }
  emails.forEach(em => {
    const isSent = em.status === 'enviado';
    const oR = pc(em.aberturas,em.enviados), cR = pc(em.cliques,em.aberturas);
    const stCls = isSent ? 'badge-success' : em.status==='pendente' ? 'badge-warning' : 'badge-purple';
    const stLbl = isSent ? 'Enviado' : em.status==='pendente' ? 'Pendente' : 'Rascunho';

    h += `<div class="card email-card ${isSent?'':'pend'}">
      <div style="padding:12px 16px;border-bottom:1px solid var(--g100);display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="display:flex;align-items:center;gap:8px"><span style="font-size:13px;font-weight:600;color:var(--navy)">${em.nome}</span><span class="badge ${stCls}">${stLbl}</span></div>
          <div style="font-size:11px;color:var(--g500);margin-top:3px">Assunto: <em>"${em.assunto}"</em>${em.data_envio?` <span style="margin-left:8px">📅 ${em.data_envio}</span>`:''}</div>
        </div>
        <div style="display:flex;gap:4px">
          <button class="btn btn-icon btn-outline btn-sm" onclick="openEditEmailModal('${em.id}')" title="Editar"><span class="icon icon-sm">edit</span></button>
          <button class="btn btn-icon btn-danger btn-sm" onclick="deleteEmail('${em.id}')" title="Excluir"><span class="icon icon-sm">delete</span></button>
        </div>
      </div>`;

    if (em.enviados > 0) {
      h += `<div style="padding:10px 16px;display:grid;grid-template-columns:repeat(auto-fit,minmax(75px,1fr));gap:6px">`;
      [{l:'Enviados',v:em.enviados,c:'var(--navy)'},{l:'Aberturas',v:em.aberturas,s:oR+'%',c:'var(--cyan)'},{l:'Cliques',v:em.cliques,s:cR+'%',c:'var(--purple)'},{l:'Vendas',v:em.vendas,c:'var(--emerald)'},{l:'Bounces',v:em.bounces,c:'var(--yellow)'},{l:'Unsubs',v:em.unsubs,c:'var(--error)'}].forEach(m => {
        h += `<div class="mcell"><div class="mcell-l">${m.l}</div><div class="mcell-v" style="color:${m.c}">${fmt(m.v)}</div>${m.s?`<div class="mcell-s" style="color:${m.c}">${m.s}</div>`:''}</div>`;

      h += '</div>';

        });
        h += '</div></div>';
      }
    }
    h += '</div>';
  });
  h += '</div>';
  return h;
}

// ===================== SOCIAL TAB =====================
function renderSocialTab() {
  const reels = socials.filter(s => s.tipo === 'reel');
  const stories = socials.filter(s => s.tipo === 'story');
  const tot = { alc:0,imp:0,cur:0,com:0,comp:0,salv:0,cl:0,vis:0,seg:0 };
  socials.forEach(s => { tot.alc+=s.alcance;tot.imp+=s.impressoes;tot.cur+=s.curtidas;tot.com+=s.comentarios;tot.comp+=s.compartilhamentos;tot.salv+=s.salvamentos;tot.cl+=s.cliques_link;tot.vis+=s.visualizacoes_completas;tot.seg+=s.seguidores_ganhos; });

  let h = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <div class="section-title" style="margin:0">Redes Sociais</div>
    <button class="btn btn-primary btn-sm" onclick="openNewSocialModal()"><span class="icon icon-sm">add</span> Nova Publicação</button>
  </div>`;

  h += '<div class="kpi-grid">';
  [{l:'Alcance',v:tot.alc,i:'👁️',c:'var(--info)'},{l:'Impressões',v:tot.imp,i:'📊',c:'var(--cyan)'},{l:'Curtidas',v:tot.cur,i:'❤️',c:'var(--error)'},{l:'Comentários',v:tot.com,i:'💬',c:'var(--purple)'},{l:'Compartilh.',v:tot.comp,i:'🔄',c:'var(--success)'},{l:'Salvamentos',v:tot.salv,i:'🔖',c:'var(--orange)'},{l:'Cliques Link',v:tot.cl,i:'🔗',c:'var(--navy)'},{l:'Vis. Completas',v:tot.vis,i:'▶️',c:'var(--pink)'},{l:'Seguidores',v:tot.seg,i:'👥',c:'var(--emerald)'}].forEach(k => {
    h += `<div class="card kpi" style="border-top-color:${k.c}"><div class="kpi-label">${k.i} ${k.l}</div><div class="kpi-value">${fmt(k.v)}</div></div>`;
  });
  h += '</div>';

  // Reels
  h += `<div class="section-divider" style="margin-top:20px">🎬 Reels (${reels.length})</div>`;
  if (reels.length === 0) h += '<div class="card empty" style="padding:20px"><p style="font-size:12px">Nenhum reel cadastrado</p></div>';
  reels.forEach(s => { h += renderSocialCard(s); });

  // Stories
  h += `<div class="section-divider">📱 Stories (${stories.length})</div>`;
  if (stories.length === 0) h += '<div class="card empty" style="padding:20px"><p style="font-size:12px">Nenhum story cadastrado</p></div>';
  stories.forEach(s => { h += renderSocialCard(s); });

  return h;
}

      <div style="display:flex;gap:4px">

async function saveCampaign() {
  const d = { nome:$('m-camp-nome').value, descricao:$('m-camp-desc').value, data_inicio:$('m-camp-ini').value||null, data_fim:$('m-camp-fim').value||null, status:$('m-camp-status').value };
  if (!d.nome) { toast('Preencha o nome'); return; }
  const { error } = await sb.from('campanhas').insert(d);
  if (error) { toast('Erro: '+error.message); return; }
  closeModal(); toast('Campanha criada!'); await loadCampaigns(); renderCampaignsList();
}

async function updateCampaign(id) {
  const d = { nome:$('m-camp-nome').value, descricao:$('m-camp-desc').value, data_inicio:$('m-camp-ini').value||null, data_fim:$('m-camp-fim').value||null, status:$('m-camp-status').value };
  const { error } = await sb.from('campanhas').update(d).eq('id', id);
  if (error) { toast('Erro: '+error.message); return; }
  closeModal(); toast('Campanha atualizada!'); await loadCampaigns(); renderCampaignsList();
}

async function deleteCampaign(id) {
  if (!confirm('Excluir esta campanha e todos os dados associados?')) return;
  await sb.from('campanhas').delete().eq('id', id);
  toast('Campanha excluída'); await loadCampaigns(); renderCampaignsList();
}

async function updateWhatsapp(id) {

  const { error } = await sb.from('whatsapp_campanha').update(d).eq('id', id);

      <div class="grid-2"><div><label>Nome</label><input id="m-so-nome" value="${s.nome}"></div><div><label>Tipo</label><select id="m-so-tipo"><option value="reel" ${s.tipo==='reel'?'selected':''}>Reel</option><option value="story" ${s.tipo==='story'?'selected':''}>Story</option></select></div></div>

function getSocialFormData() {
  return {
    campanha_id:currentCampaign.id, tipo:$('m-so-tipo').value, nome:$('m-so-nome').value,
    descricao:$('m-so-desc').value, data_publicacao:$('m-so-data').value||null, status:$('m-so-status').value,
    alcance:+$('m-so-alc').value||0, impressoes:+$('m-so-imp').value||0, curtidas:+$('m-so-cur').value||0,
    comentarios:+$('m-so-com').value||0, compartilhamentos:+$('m-so-comp').value||0, salvamentos:+$('m-so-salv').value||0,
    cliques_link:+$('m-so-cl').value||0, visualizacoes_completas:+$('m-so-vis').value||0, seguidores_ganhos:+$('m-so-seg').value||0,
  };
}

async function saveSocial() {
  const d = getSocialFormData();
  if (!d.nome) { toast('Preencha o nome'); return; }
  const { error } = await sb.from('social_campanha').insert(d);
  if (error) { toast('Erro: '+error.message); return; }
  closeModal(); toast('Publicação criada!'); await loadCampaignData(currentCampaign.id); renderCampaignDetail();
}

async function updateSocial(id) {
  const d = getSocialFormData(); delete d.campanha_id;
  const { error } = await sb.from('social_campanha').update(d).eq('id', id);
  if (error) { toast('Erro: '+error.message); return; }
  closeModal(); toast('Atualizado!'); await loadCampaignData(currentCampaign.id); renderCampaignDetail();
}

async function deleteSocial(id) {
  if (!confirm('Excluir esta publicação?')) return;
  await sb.from('social_campanha').delete().eq('id', id);
  toast('Excluído'); await loadCampaignData(currentCampaign.id); renderCampaignDetail();
}
