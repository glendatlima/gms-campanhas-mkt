<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GMS — Marketing Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#10293F;--navy2:#1a3d5c;--cyan:#45E5E5;--cyan2:#2ecece;--cl:#E8F9F9;--yellow:#FFB800;--w:#FFF;--bg:#F8FAFC;--g100:#F5F5F5;--g200:#E5E5E5;--g300:#CCC;--g500:#666;--g700:#444;--g900:#333;--err:#DC2626;--errbg:#FEF2F2;--ok:#16A34A;--okbg:#F0FDF4;--info:#2563EB;--infobg:#EFF6FF;--purp:#7C3AED;--orange:#EA580C;--pink:#DB2777;--em:#059669;--sh:0 1px 3px rgba(16,41,63,.08);--shl:0 4px 12px rgba(16,41,63,.12)}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--g900);min-height:100vh}
.icon{font-family:'Material Symbols Rounded';font-size:20px;font-style:normal;line-height:1;user-select:none;vertical-align:middle}.icon-sm{font-size:16px}.icon-lg{font-size:24px}
.top{height:56px;background:var(--navy);display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(16,41,63,.2)}
.tm{background:var(--cyan);color:var(--navy);font-weight:700;font-size:14px;padding:4px 8px;border-radius:5px}.tt{color:#fff;font-size:14px;opacity:.9;font-weight:500}
.tb{flex:1;font-size:13px;color:rgba(255,255,255,.55);display:flex;align-items:center;gap:4px}.tb .a{color:#fff;font-weight:500}.tb span[onclick]{cursor:pointer}.tb span[onclick]:hover{color:var(--cyan)}
.ct{max-width:1200px;margin:0 auto;padding:24px 20px}
.card{background:var(--w);border-radius:10px;box-shadow:var(--sh);border:1px solid var(--g200);transition:all .2s}.card:hover{box-shadow:var(--shl)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:7px;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:all .15s;font-family:inherit}
.bp{background:var(--cyan);color:var(--navy)}.bp:hover{background:var(--cyan2)}.bo{background:transparent;border:1px solid var(--g300);color:var(--g700)}.bo:hover{border-color:var(--cyan);color:var(--navy)}.bd{background:transparent;border:1px solid var(--err);color:var(--err)}.bd:hover{background:var(--errbg)}.bs{padding:5px 12px;font-size:11px}.bi{padding:6px;min-width:32px;min-height:32px;justify-content:center}
input,select,textarea{width:100%;padding:8px 12px;border-radius:7px;border:1px solid var(--g300);font-size:13px;font-family:inherit;outline:none;transition:border .15s}input:focus,select:focus,textarea:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(69,229,229,.15)}select{cursor:pointer}textarea{resize:vertical;min-height:60px}label{font-size:11px;color:var(--g500);font-weight:500;margin-bottom:3px;display:block}
.badge{display:inline-flex;padding:3px 10px;border-radius:9999px;font-size:10px;font-weight:600}.b-ok{background:var(--okbg);color:var(--ok);border:1px solid rgba(22,163,74,.3)}.b-warn{background:#FFFBEB;color:#92400E;border:1px solid rgba(255,184,0,.5)}.b-err{background:var(--errbg);color:var(--err);border:1px solid rgba(220,38,38,.3)}.b-info{background:var(--infobg);color:var(--info);border:1px solid rgba(37,99,235,.3)}.b-purp{background:#F5F3FF;color:var(--purp);border:1px solid rgba(124,58,237,.3)}
.tabs{display:flex;gap:0;border-bottom:2px solid var(--g200);margin:20px 0;flex-wrap:wrap}.tab{padding:10px 16px;font-size:13px;font-weight:400;color:var(--g500);background:0;border:0;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;font-family:inherit;transition:all .15s;white-space:nowrap}.tab.active{color:var(--navy);font-weight:600;border-bottom-color:var(--cyan)}.tab:hover{color:var(--navy)}
.kg{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px}.kpi{padding:14px 16px;border-top:3px solid var(--navy)}.kl{font-size:10px;color:var(--g500);margin-bottom:4px;font-weight:500}.kv{font-size:22px;font-weight:700;color:var(--navy);line-height:1}.ks{font-size:10px;font-weight:600;margin-top:3px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}@media(max-width:768px){.g2,.g3{grid-template-columns:1fr}}
.st{font-size:14px;font-weight:600;color:var(--navy);margin-bottom:14px;font-family:'Poppins',sans-serif}.sd{font-size:11px;color:var(--g500);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin:14px 0 8px;padding:8px 0;border-bottom:1px dashed var(--g200)}
.mc{text-align:center;padding:6px 4px;border-radius:6px;background:var(--bg)}.ml{font-size:9px;color:var(--g500);margin-bottom:2px}.mv{font-size:16px;font-weight:700}.ms{font-size:9px;font-weight:600}
.li{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;background:var(--bg);border:1px solid var(--g200)}.ld{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ec{border-left:4px solid var(--ok);overflow:hidden;margin-bottom:12px}.ec.pend{border-left-color:var(--yellow)}
.cc{padding:20px;cursor:pointer;border-left:4px solid var(--cyan);transition:all .2s}.cc:hover{transform:translateY(-2px);box-shadow:var(--shl)}
.fc{padding:20px;cursor:pointer;border-left:4px solid var(--purp);transition:all .2s}.fc:hover{transform:translateY(-2px)}
.emp{padding:40px;text-align:center;color:var(--g500)}.emp .icon{font-size:48px;color:var(--g300);display:block;margin-bottom:12px}
.mo{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(16,41,63,.5);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}.mo.open{opacity:1;pointer-events:all}
.md{background:var(--w);border-radius:14px;width:90%;max-width:620px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(16,41,63,.3);transform:scale(.95);transition:transform .2s}.mo.open .md{transform:scale(1)}
.mh{padding:16px 20px;border-bottom:1px solid var(--g200);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--w);z-index:1;border-radius:14px 14px 0 0}.mh h2{font-size:16px;font-weight:600;color:var(--navy);font-family:'Poppins',sans-serif}
.mb{padding:20px}.mf{padding:12px 20px;border-top:1px solid var(--g200);display:flex;gap:8px;justify-content:flex-end}
.toast{position:fixed;bottom:20px;right:20px;background:var(--navy);color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(16,41,63,.15);opacity:0;transition:opacity .3s;pointer-events:none;z-index:300;display:flex;align-items:center;gap:8px}.toast.show{opacity:1}
.ld2{display:flex;align-items:center;justify-content:center;padding:60px}.sp{width:36px;height:36px;border:3px solid var(--g200);border-top-color:var(--cyan);border-radius:50%;animation:spin .7s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
.tw{position:relative;padding-left:30px}.tw::before{content:'';position:absolute;left:11px;top:0;bottom:0;width:2px;background:var(--g200)}.ti{position:relative;margin-bottom:16px}.tdot{position:absolute;left:-25px;top:4px;width:14px;height:14px;border-radius:50%;border:2px solid var(--w);box-shadow:0 0 0 2px var(--g300)}.tdt{font-size:10px;color:var(--g500);font-weight:600;margin-bottom:4px}.tc{background:var(--w);border:1px solid var(--g200);border-radius:8px;padding:12px;box-shadow:var(--sh)}.tc.act{border-left:3px solid var(--cyan)}.tc.res{border-left:3px solid var(--em)}.ttg{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}.ttt{font-size:13px;font-weight:600;color:var(--navy)}.ttd{font-size:11px;color:var(--g500);margin-top:2px}
.ua{border:2px dashed var(--g300);border-radius:8px;padding:30px;text-align:center;cursor:pointer;transition:all .2s}.ua:hover,.ua.drag{border-color:var(--cyan);background:var(--cl)}.ua input{display:none}
.feat-hero{background:linear-gradient(135deg,#10293F,#1a3d5c);border-radius:12px;padding:24px;color:#fff;margin-bottom:20px}
.ft{margin-top:32px;padding-top:16px;border-top:1px solid var(--g200);text-align:center}.ft p{font-size:10px;color:var(--g500)}
.nav{display:flex;gap:4px;padding:20px 0 0;margin-bottom:0}
.nav-btn{padding:10px 20px;font-size:13px;font-weight:500;color:var(--g500);background:var(--w);border:1px solid var(--g200);border-bottom:none;border-radius:8px 8px 0 0;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:6px}
.nav-btn.active{color:var(--navy);font-weight:600;background:var(--w);border-color:var(--g200);box-shadow:0 -2px 8px rgba(16,41,63,.06);position:relative}
.nav-btn.active::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:var(--w)}
.nav-btn:hover{color:var(--navy)}
.nav-panel{background:var(--w);border:1px solid var(--g200);border-radius:0 8px 8px 8px;padding:24px;box-shadow:var(--sh);min-height:200px}
@media print{.top,.nav,.btn,.no-print{display:none!important}body{background:#fff}}
</style>
</head>
<body>
<header class="top">
<div style="display:flex;align-items:center;gap:10px"><span class="tm">GMS</span><span class="tt">Marketing Intelligence</span></div>
<nav class="tb" id="bc"><span class="a">Painel de Marketing</span></nav>
</header>
<div class="ct" id="app"><div class="ld2"><div class="sp"></div></div></div>
<div class="mo" id="mo" onclick="if(event.target===this)cm()"><div class="md"><div class="mh"><h2 id="mt"></h2><button class="btn bi bo" onclick="cm()"><span class="icon icon-sm">close</span></button></div><div class="mb" id="mmb"></div><div class="mf" id="mmf"></div></div></div>
<div class="toast" id="tst"></div>
<script>

const SB_URL='https://rziulhxiwgjcizieqcae.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ6aXVsaHhpd2dqY2l6aWVxY2FlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MDM5OTksImV4cCI6MjA5MDQ3OTk5OX0.UeOfPqM6Gn1zTsnV6WmsNO8uCtdnjux3gEqwUrM2DBM';
const db=supabase.createClient(SB_URL,SB_KEY);
let vw='home',mainTab='campanhas',cCamp=null,cTab='timeline',cFeat=null,fTab='overview';
let camps=[],ems=[],wps=[],socs=[],ress=[],feats=[],fLinks=[],fFbs=[],ocors=[],allRes=[];
const $=id=>document.getElementById(id);
const P=(n,d)=>d>0?(n/d*100).toFixed(1):'0.0';
const F=n=>(n||0).toLocaleString('pt-BR');
const ORI={email_campanha:'E-mail',whatsapp:'WhatsApp',rede_social:'Rede Social',indicacao:'Indicação',comercial:'Comercial',google:'Google',outro:'Outro'};
const OCOR_TIPOS={promocao:'Promoção/Oferta',ausencia:'Ausência/Férias',problema_tecnico:'Problema Técnico',evento_externo:'Evento Externo',mudanca_preco:'Mudança de Preço',concorrente:'Concorrente',leads:'Leads',mudanca_time:'Mudança no Time',outro:'Outro'};
const OCOR_ICONS={promocao:'sell',ausencia:'person_off',problema_tecnico:'error',evento_externo:'event',mudanca_preco:'price_change',concorrente:'groups',leads:'trending_up',mudanca_time:'swap_horiz',outro:'more_horiz'};
const OCOR_COLORS={promocao:'#45E5E5',ausencia:'#EA580C',problema_tecnico:'#DC2626',evento_externo:'#2563EB',mudanca_preco:'#FFB800',concorrente:'#DB2777',leads:'#7C3AED',mudanca_time:'#10293F',outro:'#666'};
const IMP_B={positivo:'b-ok',negativo:'b-err',neutro:'b-info'};
const ORIC={email_campanha:'#2563EB',whatsapp:'#16A34A',rede_social:'#DB2777',indicacao:'#7C3AED',comercial:'#EA580C',google:'#45E5E5',outro:'#666'};
function tst(m){const t=$('tst');t.innerHTML='<span class="icon icon-sm">check_circle</span>'+m;t.classList.add('show');clearTimeout(window._t);window._t=setTimeout(()=>t.classList.remove('show'),2500)}
function om(t,b,f){$('mt').textContent=t;$('mmb').innerHTML=b;$('mmf').innerHTML=f;$('mo').classList.add('open')}
function cm(){$('mo').classList.remove('open')}
function sbc(p){$('bc').innerHTML=p.map((x,i)=>i<p.length-1?`<span onclick="${x.a||''}">${x.l}</span><span style="opacity:.4">›</span>`:`<span class="a">${x.l}</span>`).join('')}

// DATA
async function ldCamps(){const{data}=await db.from('campanhas').select('*').order('created_at',{ascending:false});camps=data||[]}
async function ldOcors(){const{data}=await db.from('ocorrencias').select('*').order('data_inicio',{ascending:false});ocors=data||[]}
async function ldAllRes(){const{data}=await db.from('resultados_campanha').select('*').order('data',{ascending:false});allRes=data||[]}
async function ldFeats(){const{data}=await db.from('features').select('*').order('created_at',{ascending:false});feats=data||[]}
async function ldCampD(id){const[e,w,s,r]=await Promise.all([db.from('emails_campanha').select('*').eq('campanha_id',id).order('ordem'),db.from('whatsapp_campanha').select('*').eq('campanha_id',id).order('created_at'),db.from('social_campanha').select('*').eq('campanha_id',id).order('data_publicacao',{ascending:false}),db.from('resultados_campanha').select('*').eq('campanha_id',id).order('data')]);ems=e.data||[];wps=w.data||[];socs=s.data||[];ress=r.data||[]}
async function ldFeatD(id){const[l,f]=await Promise.all([db.from('feature_campanhas').select('*,campanhas(*)').eq('feature_id',id),db.from('feature_feedbacks').select('*').eq('feature_id',id).order('data',{ascending:false})]);fLinks=l.data||[];fFbs=f.data||[]}

// HOME
function rHome(){
  vw='home';cCamp=null;cFeat=null;sbc([{l:'Painel de Marketing'}]);
  let h='<div style="margin-bottom:20px"><h1 style="font-size:24px;font-weight:700;color:var(--navy);font-family:Poppins,sans-serif;margin:0">📊 Marketing Intelligence</h1><p style="font-size:13px;color:var(--g500);margin-top:4px">Gerencie campanhas, features e resultados</p></div>';
  h+=`<div class="nav"><button class="nav-btn ${mainTab==='campanhas'?'active':''}" onclick="mainTab='campanhas';rHome()"><span class="icon icon-sm">campaign</span> Campanhas (${camps.length})</button><button class="nav-btn ${mainTab==='features'?'active':''}" onclick="mainTab='features';rHome()"><span class="icon icon-sm">extension</span> Features (${feats.length})</button><button class="nav-btn ${mainTab==='resultados'?'active':''}" onclick="mainTab='resultados';rHome()"><span class="icon icon-sm">monetization_on</span> Resultados (${allRes.length})</button><button class="nav-btn ${mainTab==='ocorrencias'?'active':''}" onclick="mainTab='ocorrencias';rHome()"><span class="icon icon-sm">event_note</span> Ocorrências (${ocors.length})</button><button class="nav-btn ${mainTab==='comparativo'?'active':''}" onclick="mainTab='comparativo';rHome()"><span class="icon icon-sm">compare_arrows</span> Comparativo</button></div><div class="nav-panel">`;
  if(mainTab==='campanhas')h+=rCampList();
  else if(mainTab==='features')h+=rFeatList();
  else if(mainTab==='resultados')h+=pgResGlobal();
  else if(mainTab==='ocorrencias')h+=pgOcor();
  else if(mainTab==='comparativo')h+=pgComp();
  h+='</div><div class="ft"><p>© 2026 Sismais Tecnologia · GMS</p></div>';
  $('app').innerHTML=h;
  if(mainTab==='resultados')setTimeout(chResG,100);
}

// CAMPAIGNS LIST
function rCampList(){
  let h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><div class="st" style="margin:0">Campanhas de Marketing</div><button class="btn bp" onclick="omNewCamp()"><span class="icon icon-sm">add</span> Nova Campanha</button></div>';
  if(!camps.length)return h+'<div class="card emp"><span class="icon">campaign</span><p style="font-size:14px;font-weight:500">Nenhuma campanha</p></div>';
  camps.forEach(c=>{
    const st={ativa:'b-ok',concluida:'b-info',pausada:'b-warn',rascunho:'b-purp'}[c.status]||'b-info';
    h+=`<div class="card cc" onclick="oCamp('${c.id}')" style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div style="font-size:16px;font-weight:600;color:var(--navy);font-family:Poppins,sans-serif">${c.nome}</div>${c.descricao?`<div style="font-size:12px;color:var(--g500);margin-top:4px">${c.descricao}</div>`:''}<div style="display:flex;gap:12px;margin-top:10px;font-size:11px;color:var(--g700);align-items:center">${c.data_inicio?`<span>📅 ${c.data_inicio} → ${c.data_fim||'...'}</span>`:''}<span class="badge ${st}">${c.status}</span></div></div><div style="display:flex;gap:4px" onclick="event.stopPropagation()"><button class="btn bi bo bs" onclick="omEditCamp('${c.id}')"><span class="icon icon-sm">edit</span></button><button class="btn bi bd bs" onclick="dCamp('${c.id}')"><span class="icon icon-sm">delete</span></button></div></div></div>`;
  });
  return h;
}

// FEATURES LIST
function rFeatList(){
  let h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><div class="st" style="margin:0">Features do GMS</div><button class="btn bp" onclick="omNewFeat()"><span class="icon icon-sm">add</span> Nova Feature</button></div>';
  if(!feats.length)return h+'<div class="card emp"><span class="icon">extension</span><p>Nenhuma feature</p></div>';
  feats.forEach(f=>{
    const st={lancada:'b-ok',em_desenvolvimento:'b-warn',em_teste:'b-info',descontinuada:'b-err'}[f.status]||'b-info';
    const stL={lancada:'Lançada',em_desenvolvimento:'Em dev',em_teste:'Em teste',descontinuada:'Desc.'}[f.status]||f.status;
    h+=`<div class="card fc" onclick="oFeat('${f.id}')" style="margin-bottom:12px"><div style="display:flex;justify-content:space-between"><div><div style="font-size:16px;font-weight:600;color:var(--navy);font-family:Poppins,sans-serif">${f.nome}</div>${f.descricao?`<div style="font-size:12px;color:var(--g500);margin-top:4px">${f.descricao}</div>`:''}<div style="display:flex;gap:12px;margin-top:10px;font-size:11px;color:var(--g700);align-items:center">${f.data_lancamento?`<span>🚀 ${f.data_lancamento}</span>`:''}<span class="badge ${st}">${stL}</span></div></div><div style="display:flex;gap:4px" onclick="event.stopPropagation()"><button class="btn bi bo bs" onclick="omEditFeat('${f.id}')"><span class="icon icon-sm">edit</span></button><button class="btn bi bd bs" onclick="dFeat('${f.id}')"><span class="icon icon-sm">delete</span></button></div></div></div>`;
  });
  return h;
}

// CAMPAIGN DETAIL
async function oCamp(id){$('app').innerHTML='<div class="ld2"><div class="sp"></div></div>';cCamp=camps.find(c=>c.id===id);await ldCampD(id);vw='camp';cTab='timeline';rCamp()}
function rCamp(){
  const c=cCamp;sbc([{l:'Painel',a:"goHome()"},{l:c.nome}]);
  let h=`<div style="margin-bottom:8px"><button class="btn bo bs no-print" onclick="goHome()" style="margin-bottom:8px"><span class="icon icon-sm">arrow_back</span> Voltar</button>
    <div style="display:flex;justify-content:space-between;align-items:center"><h1 style="font-size:20px;font-weight:700;color:var(--navy);font-family:Poppins,sans-serif;margin:0">${c.nome}</h1>
    <button class="btn bo bs no-print" onclick="window.print()"><span class="icon icon-sm">picture_as_pdf</span> Exportar PDF</button></div>
    ${c.descricao?`<p style="font-size:12px;color:var(--g500);margin-top:4px">${c.descricao}</p>`:''}</div>`;
  h+=`<div class="tabs no-print">
    <button class="tab ${cTab==='timeline'?'active':''}" onclick="sT('timeline')">📅 Timeline</button>
    <button class="tab ${cTab==='roi'?'active':''}" onclick="sT('roi')">📊 ROI</button>
    <button class="tab ${cTab==='emails'?'active':''}" onclick="sT('emails')">📧 E-mails (${ems.length})</button>
    <button class="tab ${cTab==='whatsapp'?'active':''}" onclick="sT('whatsapp')">📱 WhatsApp (${wps.length})</button>
    <button class="tab ${cTab==='social'?'active':''}" onclick="sT('social')">📸 Social (${socs.length})</button>
    <button class="tab ${cTab==='resultados'?'active':''}" onclick="sT('resultados')">💰 Resultados (${ress.length})</button></div>`;
  if(cTab==='timeline')h+=rTimeline();
  else if(cTab==='roi')h+=rROI();
  else if(cTab==='emails')h+=rEmails();
  else if(cTab==='whatsapp')h+=rWap();
  else if(cTab==='social')h+=rSoc();
  else if(cTab==='resultados')h+=rRes();
  h+='<div class="ft"><p>© 2026 Sismais · GMS</p></div>';
  $('app').innerHTML=h;
  if(cTab==='roi')rROICharts();

function rTimeline(){

  ems.forEach(e=>{if(e.data_envio)ev.push({d:e.data_envio,t:'act',cat:'📧',title:e.nome,det:`${F(e.enviados)} enviados · ${F(e.aberturas)} aberturas`,c:'var(--info)'})});
  wps.forEach(w=>{if(w.data_inicio)ev.push({d:w.data_inicio,t:'act',cat:'📱',title:w.nome,det:`Seg: ${w.segmento} · ${F(w.enviados)} enviados`,c:'var(--ok)'})});
  socs.forEach(s=>{if(s.data_publicacao)ev.push({d:s.data_publicacao,t:'act',cat:s.tipo==='reel'?'🎬':'📱',title:s.nome,det:`${F(s.alcance)} alcance`,c:'var(--pink)'})});
  const rd={};
  ress.forEach(r=>{if(!rd[r.data])rd[r.data]={n:0,u:0,rc:0,o:{}};const x=rd[r.data];if(r.tipo==='nova_assinatura')x.n++;else x.u++;x.rc+=Number(r.valor_mensal)||0;x.o[r.origem]=(x.o[r.origem]||0)+1});
  Object.entries(rd).forEach(([d,x])=>{const ot=Object.entries(x.o).map(([k,v])=>`${ORI[k]||k}: ${v}`).join(', ');ev.push({d,t:'res',cat:'💰',title:`${x.n} nova(s), ${x.u} upgrade(s)`,det:`R$ ${x.rc.toFixed(2)} · ${ot}`,c:'var(--em)'})});
  ev.sort((a,b)=>a.d.localeCompare(b.d));
  let h='<div class="st">📅 Timeline — Ações x Resultados</div>';
  if(!ev.length)return h+'<div class="card emp"><span class="icon">timeline</span><p style="font-weight:500">Nenhum evento</p><p style="font-size:12px">Cadastre e-mails com data e importe resultados</p></div>';
  h+='<div class="tw">';let ld='';
  ev.forEach(e=>{const sd=e.d!==ld;ld=e.d;h+=`<div class="ti"><div class="tdot" style="background:${e.c};box-shadow:0 0 0 2px ${e.c}"></div>${sd?`<div class="tdt">${e.d}</div>`:''}<div class="tc ${e.t==='res'?'res':'act'}"><div class="ttg" style="color:${e.c}">${e.cat} ${e.t==='res'?'RESULTADO':'AÇÃO'}</div><div class="ttt">${e.title}</div><div class="ttd">${e.det}</div></div></div>`});

}

// CSV
let csvR=[];
function omCSV(){om('Importar CSV',`<div style="margin-bottom:16px"><p style="font-size:13px;color:var(--g700);margin-bottom:8px">Formato:</p><div class="card" style="padding:12px;font-family:monospace;font-size:11px;background:var(--bg)">data,tipo,plano,valor_mensal,origem<br>2026-03-19,nova_assinatura,PRO,99.90,email_campanha</div><p style="font-size:10px;color:var(--g500);margin-top:8px">Origens: email_campanha, whatsapp, rede_social, indicacao, comercial, google, outro</p></div><div class="ua" onclick="document.getElementById('csv-f').click()"><span class="icon icon-lg" style="color:var(--g300);display:block;margin-bottom:8px">upload_file</span><p style="font-size:14px;font-weight:500;color:var(--g700)">Arraste ou clique</p><input type="file" id="csv-f" accept=".csv,.txt" onchange="hCSV(this.files[0])"></div><div id="csv-pv" style="margin-top:16px"></div>`,`<button class="btn bo" onclick="cm()">Cancelar</button><button class="btn bp" id="csv-ok" onclick="cCSV()" disabled>Importar</button>`)}
function hCSV(f){if(!f)return;const r=new FileReader();r.onload=function(e){const ls=e.target.result.split('\n').map(l=>l.trim()).filter(l=>l);if(ls.length<2){tst('CSV vazio');return}const hd=ls[0].toLowerCase().split(/[,;\t]/);const iD=hd.findIndex(h=>h.includes('data')),iT=hd.findIndex(h=>h.includes('tipo')),iP=hd.findIndex(h=>h.includes('plano')),iV=hd.findIndex(h=>h.includes('valor')),iO=hd.findIndex(h=>h.includes('origem'));if(iD<0||iT<0){tst('Precisa de "data" e "tipo"');return}csvR=[];for(let i=1;i<ls.length;i++){const c=ls[i].split(/[,;\t]/);if(c.length<2)continue;csvR.push({data:c[iD]?.trim(),tipo:c[iT]?.trim(),plano:iP>=0?c[iP]?.trim():'',valor_mensal:iV>=0?parseFloat(c[iV])||0:0,origem:iO>=0?c[iO]?.trim():'outro'})}$('csv-pv').innerHTML=`<div class="card" style="padding:12px"><p style="font-size:13px;font-weight:600;color:var(--navy)">✅ ${csvR.length} registro(s)</p></div>`;$('csv-ok').disabled=false};r.readAsText(f)}
async function cCSV(){if(!csvR.length)return;const rows=csvR.map(r=>({...r,campanha_id:cCamp.id}));const{error}=await db.from('resultados_campanha').insert(rows);if(error){tst('Erro: '+error.message);return}cm();tst(`${rows.length} importado(s)!`);csvR=[];await ldCampD(cCamp.id);rCamp()}

function pgResGlobal(){
  var n=allRes.filter(function(r){return r.tipo==='nova_assinatura'}).length;
  var u=allRes.filter(function(r){return r.tipo==='upgrade'}).length;
  var rc=allRes.reduce(function(a,r){return a+Number(r.valor_mensal||0)},0);
  var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div class="st" style="margin:0">💰 Resultados Globais</div><div style="display:flex;gap:8px" class="no-print"><button class="btn bo bs" onclick="omNewResG()"><span class="icon icon-sm">add</span> Manual</button><button class="btn bp bs" onclick="omCSVG()"><span class="icon icon-sm">upload_file</span> CSV</button></div></div>';
  h+='<div class="kg" style="margin-bottom:16px"><div class="card kpi" style="border-top-color:var(--em)"><div class="kl">🆕 Novas</div><div class="kv">'+n+'</div></div><div class="card kpi" style="border-top-color:var(--purp)"><div class="kl">⬆️ Upgrades</div><div class="kv">'+u+'</div></div><div class="card kpi" style="border-top-color:var(--ok)"><div class="kl">💵 Receita</div><div class="kv">R$ '+rc.toFixed(2)+'</div></div><div class="card kpi" style="border-top-color:var(--navy)"><div class="kl">📊 Total</div><div class="kv">'+allRes.length+'</div></div></div>';
  h+='<div class="g2" style="margin-bottom:16px"><div class="card" style="padding:20px"><div class="st" style="margin:0 0 12px">Por Origem</div><canvas id="rg-o" height="220"></canvas></div><div class="card" style="padding:20px"><div class="st" style="margin:0 0 12px">Evolução Mensal</div><canvas id="rg-t" height="220"></canvas></div></div>';
  if(allRes.length){
    h+='<div class="card" style="overflow-x:auto;padding:16px"><table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr style="background:var(--navy);color:#fff"><th style="padding:8px 12px;text-align:left">Data</th><th style="padding:8px 12px">Tipo</th><th style="padding:8px 12px">Plano</th><th style="padding:8px 12px;text-align:right">Valor</th><th style="padding:8px 12px">Origem</th><th style="padding:8px 12px">Campanha</th><th style="padding:8px 12px;width:40px" class="no-print"></th></tr></thead><tbody>';
    allRes.forEach(function(r){var cn=r.campanha_id?((camps.find(function(c){return c.id===r.campanha_id})||{}).nome||'—'):'(global)';h+='<tr style="border-bottom:1px solid var(--g100)"><td style="padding:8px 12px">'+r.data+'</td><td style="padding:8px 12px"><span class="badge '+(r.tipo==='nova_assinatura'?'b-ok':'b-purp')+'">'+(r.tipo==='nova_assinatura'?'Nova':'Upgrade')+'</span></td><td style="padding:8px 12px">'+(r.plano||'—')+'</td><td style="padding:8px 12px;text-align:right;font-weight:600;color:var(--em)">R$ '+Number(r.valor_mensal||0).toFixed(2)+'</td><td style="padding:8px 12px"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+(ORIC[r.origem]||'#666')+';margin-right:4px"></span>'+(ORI[r.origem]||r.origem)+'</td><td style="padding:8px 12px;font-size:11px;color:var(--g500)">'+cn+'</td><td style="padding:8px 12px" class="no-print"><button class="btn bi bd bs" onclick="dResG(\''+r.id+'\')"><span class="icon icon-sm">delete</span></button></td></tr>'});
    h+='</tbody></table></div>';
  } else { h+='<div class="card emp"><span class="icon">monetization_on</span><p>Nenhum resultado</p></div>'; }
  return h;
}
function chResG(){
  var po={};allRes.forEach(function(r){po[r.origem]=(po[r.origem]||0)+1});var c1=document.getElementById('rg-o');
  if(c1&&Object.keys(po).length)new Chart(c1,{type:'doughnut',data:{labels:Object.keys(po).map(function(k){return ORI[k]||k}),datasets:[{data:Object.values(po),backgroundColor:Object.keys(po).map(function(k){return ORIC[k]||'#666'}),borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,plugins:{legend:{position:'bottom'}}}});
  var pm={};allRes.forEach(function(r){var m=r.data?r.data.substring(0,7):'?';if(!pm[m])pm[m]={n:0,u:0};if(r.tipo==='nova_assinatura')pm[m].n++;else pm[m].u++});var ms=Object.keys(pm).sort();var c2=document.getElementById('rg-t');
  if(c2&&ms.length)new Chart(c2,{type:'bar',data:{labels:ms.map(function(m){var p=m.split('-');var mn=['','Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];return mn[parseInt(p[1])]+' '+p[0]}),datasets:[{label:'Novas',data:ms.map(function(m){return pm[m].n}),backgroundColor:'rgba(5,150,105,0.7)',borderRadius:4},{label:'Upgrades',data:ms.map(function(m){return pm[m].u}),backgroundColor:'rgba(124,58,237,0.7)',borderRadius:4}]},options:{responsive:true,plugins:{legend:{position:'bottom'}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}});
}
function omNewResG(){var ori=Object.entries(ORI).map(function(e){return'<option value="'+e[0]+'">'+e[1]+'</option>'}).join('');var co='<option value="">Nenhuma (global)</option>'+camps.map(function(c){return'<option value="'+c.id+'">'+c.nome+'</option>'}).join('');om('Novo Resultado','<div style="display:flex;flex-direction:column;gap:10px"><div class="g2"><div><label>Data</label><input type="date" id="mrg-d"></div><div><label>Tipo</label><select id="mrg-t"><option value="nova_assinatura">Nova Assinatura</option><option value="upgrade">Upgrade</option></select></div></div><div class="g3"><div><label>Plano</label><input id="mrg-p" placeholder="PRO"></div><div><label>Valor (R$)</label><input type="number" step="0.01" id="mrg-v" value="0"></div><div><label>Origem</label><select id="mrg-o">'+ori+'</select></div></div><div><label>Campanha (opcional)</label><select id="mrg-c">'+co+'</select></div></div>','<button class="btn bo" onclick="cm()">Cancelar</button><button class="btn bp" onclick="svResG()">Salvar</button>')}
async function svResG(){var d={data:$('mrg-d').value,tipo:$('mrg-t').value,plano:$('mrg-p').value,valor_mensal:+$('mrg-v').value||0,origem:$('mrg-o').value,campanha_id:$('mrg-c').value||null};if(!d.data){tst('Preencha data');return}await db.from('resultados_campanha').insert(d);cm();tst('Salvo!');await ldAllRes();rHome()}
async function dResG(id){if(!confirm('Excluir?'))return;await db.from('resultados_campanha').delete().eq('id',id);tst('Excluído');await ldAllRes();rHome()}
var csvRG=[];
function omCSVG(){var co='<option value="">Nenhuma (global)</option>'+camps.map(function(c){return'<option value="'+c.id+'">'+c.nome+'</option>'}).join('');om('Importar CSV','<div style="margin-bottom:12px"><label>Campanha (opcional)</label><select id="cg-c">'+co+'</select></div><div style="margin-bottom:16px"><div class="card" style="padding:12px;font-family:monospace;font-size:11px;background:var(--bg)">data,tipo,plano,valor_mensal,origem<br>2026-03-19,nova_assinatura,PRO,99.90,email_campanha</div></div><div class="ua" onclick="document.getElementById(\'cg-f\').click()"><span class="icon icon-lg" style="color:var(--g300);display:block;margin-bottom:8px">upload_file</span><p style="font-size:14px;font-weight:500;color:var(--g700)">Arraste ou clique</p><input type="file" id="cg-f" accept=".csv,.txt" onchange="hCSVG(this.files[0])"></div><div id="cg-pv" style="margin-top:16px"></div>','<button class="btn bo" onclick="cm()">Cancelar</button><button class="btn bp" id="cg-ok" onclick="cCSVG()" disabled>Importar</button>')}
function hCSVG(f){if(!f)return;var r=new FileReader();r.onload=function(e){var ls=e.target.result.split('\n').map(function(l){return l.trim()}).filter(function(l){return l});if(ls.length<2)return;var hd=ls[0].toLowerCase().split(/[,;\t]/);var iD=hd.findIndex(function(x){return x.includes('data')});var iT=hd.findIndex(function(x){return x.includes('tipo')});var iP=hd.findIndex(function(x){return x.includes('plano')});var iV=hd.findIndex(function(x){return x.includes('valor')});var iO=hd.findIndex(function(x){return x.includes('origem')});if(iD<0||iT<0)return;csvRG=[];for(var i=1;i<ls.length;i++){var c=ls[i].split(/[,;\t]/);if(c.length<2)continue;csvRG.push({data:c[iD]?.trim(),tipo:c[iT]?.trim(),plano:iP>=0?c[iP]?.trim():'',valor_mensal:iV>=0?parseFloat(c[iV])||0:0,origem:iO>=0?c[iO]?.trim():'outro'})}document.getElementById('cg-pv').innerHTML='<p style="font-weight:600;color:var(--navy)">✅ '+csvRG.length+' registro(s)</p>';document.getElementById('cg-ok').disabled=false};r.readAsText(f)}
async function cCSVG(){if(!csvRG.length)return;var cid=document.getElementById('cg-c')?.value||null;var rows=csvRG.map(function(r){return Object.assign({},r,{campanha_id:cid})});await db.from('resultados_campanha').insert(rows);cm();tst(rows.length+' importado(s)!');csvRG=[];await ldAllRes();rHome()}

// ==================== OCORRÊNCIAS ====================
function pgOcor(){
  var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div class="st" style="margin:0">📋 Diário de Ocorrências</div><button class="btn bp" onclick="omNewOc()"><span class="icon icon-sm">add</span> Nova</button></div>';
  if(!ocors.length)return h+'<div class="card emp"><span class="icon">event_note</span><p style="font-weight:500">Nenhuma ocorrência</p></div>';
  var byM={};ocors.forEach(function(o){var m=o.data_inicio.substring(0,7);if(!byM[m])byM[m]=[];byM[m].push(o)});
  Object.entries(byM).sort(function(a,b){return b[0].localeCompare(a[0])}).forEach(function(entry){
    var month=entry[0],items=entry[1],p=month.split('-');
    var mn=['','Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
    h+='<div class="sd">'+mn[parseInt(p[1])]+' '+p[0]+' ('+items.length+')</div>';
    items.forEach(function(o){
      var tp=OCOR_TIPOS[o.tipo]||o.tipo,ic=OCOR_ICONS[o.tipo]||'more_horiz',cl=OCOR_COLORS[o.tipo]||'#666';
      var ib=IMP_B[o.impacto]||'b-info',il={positivo:'Positivo',negativo:'Negativo',neutro:'Neutro'}[o.impacto]||'Neutro';
      h+='<div class="card" style="padding:16px;margin-bottom:10px;border-left:4px solid '+cl+'"><div style="display:flex;justify-content:space-between"><div style="flex:1"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span class="icon icon-sm" style="color:'+cl+'">'+ic+'</span><span style="font-size:14px;font-weight:600;color:var(--navy)">'+o.titulo+'</span><span class="badge b-purp">'+tp+'</span><span class="badge '+ib+'">'+il+'</span></div>'+(o.descricao?'<p style="font-size:12px;color:var(--g500);margin-top:6px">'+o.descricao+'</p>':'')+'<div style="font-size:11px;color:var(--g500);margin-top:6px">📅 '+o.data_inicio+(o.data_fim?' → '+o.data_fim:'')+'</div></div><div style="display:flex;gap:4px" class="no-print"><button class="btn bi bo bs" onclick="omEditOc(\''+o.id+'\')"><span class="icon icon-sm">edit</span></button><button class="btn bi bd bs" onclick="delOc(\''+o.id+'\')"><span class="icon icon-sm">delete</span></button></div></div></div>';
    });
  });
  return h;
}
function ocFrm(o){var tp=Object.entries(OCOR_TIPOS).map(function(e){return'<option value="'+e[0]+'" '+(o?.tipo===e[0]?'selected':'')+'>'+e[1]+'</option>'}).join('');return'<div style="display:flex;flex-direction:column;gap:12px"><div><label>Título</label><input id="mo-t" value="'+(o?o.titulo:'')+'"></div><div class="g2"><div><label>Tipo</label><select id="mo-tp">'+tp+'</select></div><div><label>Impacto</label><select id="mo-imp"><option value="positivo" '+(o?.impacto==='positivo'?'selected':'')+'>Positivo</option><option value="negativo" '+(o?.impacto==='negativo'?'selected':'')+'>Negativo</option><option value="neutro" '+(o?.impacto==='neutro'?'selected':'')+'>Neutro</option></select></div></div><div class="g2"><div><label>Data início</label><input type="date" id="mo-di" value="'+(o?.data_inicio||'')+'"></div><div><label>Data fim</label><input type="date" id="mo-df" value="'+(o?.data_fim||'')+'"></div></div><div><label>Descrição</label><textarea id="mo-ds" style="width:100%;padding:8px 12px;border-radius:7px;border:1px solid var(--g300);font-size:13px;font-family:inherit;resize:vertical;min-height:60px">'+(o?.descricao||'')+'</textarea></div></div>'}
function omNewOc(){om('Nova Ocorrência',ocFrm(),'<button class="btn bo" onclick="cm()">Cancelar</button><button class="btn bp" onclick="svOc()">Registrar</button>')}
function omEditOc(id){om('Editar',ocFrm(ocors.find(function(o){return o.id===id})),'<button class="btn bo" onclick="cm()">Cancelar</button><button class="btn bp" onclick="upOc(\''+id+'\')">Salvar</button>')}
async function svOc(){var d={titulo:$('mo-t').value,tipo:$('mo-tp').value,impacto:$('mo-imp').value,data_inicio:$('mo-di').value,data_fim:$('mo-df').value||null,descricao:$('mo-ds').value};if(!d.titulo||!d.data_inicio){tst('Preencha título e data');return}await db.from('ocorrencias').insert(d);cm();tst('Registrada!');await ldOcors();rHome()}
async function upOc(id){var d={titulo:$('mo-t').value,tipo:$('mo-tp').value,impacto:$('mo-imp').value,data_inicio:$('mo-di').value,data_fim:$('mo-df').value||null,descricao:$('mo-ds').value};await db.from('ocorrencias').update(d).eq('id',id);cm();tst('Atualizada!');await ldOcors();rHome()}
async function delOc(id){if(!confirm('Excluir?'))return;await db.from('ocorrencias').delete().eq('id',id);tst('Excluída');await ldOcors();rHome()}

// ==================== COMPARATIVO MENSAL ====================
function pgComp(){
  var h='<div class="st">📊 Comparativo Mensal</div><p style="font-size:12px;color:var(--g500);margin-bottom:16px">Visão mês a mês de resultados e ocorrências</p>';
  var months={};
  allRes.forEach(function(r){var m=r.data?r.data.substring(0,7):'?';if(!months[m])months[m]={novas:0,ups:0,receita:0,ocor_pos:0,ocor_neg:0};if(r.tipo==='nova_assinatura')months[m].novas++;else months[m].ups++;months[m].receita+=Number(r.valor_mensal||0)});
  ocors.forEach(function(o){var m=o.data_inicio.substring(0,7);if(!months[m])months[m]={novas:0,ups:0,receita:0,ocor_pos:0,ocor_neg:0};if(o.impacto==='positivo')months[m].ocor_pos++;if(o.impacto==='negativo')months[m].ocor_neg++});
  var sm=Object.keys(months).sort(function(a,b){return b.localeCompare(a)});
  if(!sm.length)return h+'<div class="card emp"><span class="icon">compare_arrows</span><p>Nenhum dado para comparar</p></div>';
  var mn=['','Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  h+='<div class="card" style="overflow-x:auto;padding:0"><table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr style="background:var(--navy);color:#fff"><th style="padding:10px 12px;text-align:left">Métrica</th>';
  sm.forEach(function(m){var p=m.split('-');h+='<th style="padding:10px 12px;text-align:center">'+mn[parseInt(p[1])]+' '+p[0]+'</th>'});
  h+='</tr></thead><tbody>';
  [{l:'🆕 Novas Assinaturas',k:'novas',c:'#059669'},{l:'⬆️ Upgrades',k:'ups',c:'#7C3AED'},{l:'💵 Receita (R$)',k:'receita',c:'#16A34A',money:true},{l:'🟢 Ocor. Positivas',k:'ocor_pos',c:'#16A34A'},{l:'🔴 Ocor. Negativas',k:'ocor_neg',c:'#DC2626'}].forEach(function(row){
    h+='<tr style="border-bottom:1px solid var(--g100)"><td style="padding:10px 12px;font-weight:500">'+row.l+'</td>';
    var mx=0;sm.forEach(function(m){var v=months[m][row.k]||0;if(v>mx)mx=v});
    sm.forEach(function(m){var v=months[m][row.k]||0;var best=v>0&&v===mx&&sm.length>1;
      h+='<td style="padding:10px 12px;text-align:center;font-weight:'+(best?'700':'400')+';color:'+(best?row.c:'var(--g900)')+(best?';background:var(--okbg)':'')+'">'+(row.money?'R$ '+v.toFixed(2):v)+'</td>'});
    h+='</tr>'});
  h+='</tbody></table></div>';
  return h;
}
