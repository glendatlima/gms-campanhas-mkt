<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GMS — Análise de Campanhas</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#10293F;--navy-hover:#1a3d5c;--cyan:#45E5E5;--cyan-hover:#2ecece;--cyan-light:#E8F9F9;--yellow:#FFB800;--white:#FFF;--bg:#F8FAFC;--g100:#F5F5F5;--g200:#E5E5E5;--g300:#CCC;--g500:#666;--g700:#444;--g900:#333;--error:#DC2626;--error-bg:#FEF2F2;--success:#16A34A;--success-bg:#F0FDF4;--info:#2563EB;--info-bg:#EFF6FF;--purple:#7C3AED;--orange:#EA580C;--pink:#DB2777;--emerald:#059669;--sh:0 1px 3px rgba(16,41,63,.08);--sh-lg:0 4px 12px rgba(16,41,63,.12)}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--g900);min-height:100vh}
.icon{font-family:'Material Symbols Rounded';font-size:20px;font-style:normal;line-height:1;user-select:none;vertical-align:middle}
.icon-sm{font-size:16px}.icon-lg{font-size:24px}
.topbar{height:52px;background:var(--navy);display:flex;align-items:center;padding:0 20px;gap:16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(16,41,63,.15)}
.tb-logo{display:flex;align-items:center;gap:8px;flex-shrink:0}
.tb-mark{background:var(--cyan);color:var(--navy);font-weight:700;font-size:13px;padding:3px 7px;border-radius:4px}
.tb-text{color:#fff;font-size:13px;opacity:.9}
.tb-bc{flex:1;font-size:13px;color:rgba(255,255,255,.55);display:flex;align-items:center;gap:4px}
.tb-bc .a{color:#fff;font-weight:500}
.tb-bc span[onclick]{cursor:pointer}.tb-bc span[onclick]:hover{color:var(--cyan)}
.container{max-width:1200px;margin:0 auto;padding:24px 20px}
.card{background:var(--white);border-radius:8px;box-shadow:var(--sh);border:1px solid var(--g200);transition:box-shadow .2s,transform .2s}
.card:hover{box-shadow:var(--sh-lg)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:6px;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:all .15s;font-family:inherit}
.btn-primary{background:var(--cyan);color:var(--navy)}.btn-primary:hover{background:var(--cyan-hover)}
.btn-navy{background:var(--navy);color:#fff}.btn-navy:hover{background:var(--navy-hover)}
.btn-outline{background:transparent;border:1px solid var(--g300);color:var(--g700)}.btn-outline:hover{border-color:var(--cyan);color:var(--navy)}
.btn-danger{background:transparent;border:1px solid var(--error);color:var(--error)}.btn-danger:hover{background:var(--error-bg)}
.btn-sm{padding:5px 12px;font-size:11px}
.btn-icon{padding:6px;min-width:32px;min-height:32px;justify-content:center}
input,select,textarea{width:100%;padding:8px 12px;border-radius:6px;border:1px solid var(--g300);font-size:13px;font-family:inherit;outline:none;transition:border .15s}
input:focus,select:focus,textarea:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(69,229,229,.15)}
select{cursor:pointer}textarea{resize:vertical;min-height:60px}
label{font-size:11px;color:var(--g500);font-weight:500;margin-bottom:3px;display:block}
.badge{display:inline-flex;padding:2px 8px;border-radius:9999px;font-size:10px;font-weight:600}
.badge-success{background:var(--success-bg);color:var(--success);border:1px solid rgba(22,163,74,.3)}
.badge-warning{background:#FFFBEB;color:#92400E;border:1px solid rgba(255,184,0,.5)}
.badge-error{background:var(--error-bg);color:var(--error);border:1px solid rgba(220,38,38,.3)}
.badge-info{background:var(--info-bg);color:var(--info);border:1px solid rgba(37,99,235,.3)}
.badge-purple{background:#F5F3FF;color:var(--purple);border:1px solid rgba(124,58,237,.3)}
.tabs{display:flex;gap:0;border-bottom:2px solid var(--g200);margin:20px 0;flex-wrap:wrap}
.tab{padding:10px 16px;font-size:13px;font-weight:400;color:var(--g500);background:0;border:0;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;font-family:inherit;transition:all .15s;white-space:nowrap}
.tab.active{color:var(--navy);font-weight:600;border-bottom-color:var(--cyan)}
.tab:hover{color:var(--navy)}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px}
.kpi{padding:14px 16px;border-top:3px solid var(--navy)}
.kpi-label{font-size:10px;color:var(--g500);margin-bottom:4px;font-weight:500}
.kpi-value{font-size:22px;font-weight:700;color:var(--navy);line-height:1}
.kpi-sub{font-size:10px;font-weight:600;margin-top:3px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:768px){.grid-2,.grid-3{grid-template-columns:1fr}}
.section-title{font-size:14px;font-weight:600;color:var(--navy);margin-bottom:14px;font-family:'Poppins',sans-serif}
.section-divider{font-size:11px;color:var(--g500);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin:14px 0 8px;padding:8px 0;border-bottom:1px dashed var(--g200)}
.mcell{text-align:center;padding:6px 4px;border-radius:6px;background:var(--bg)}
.mcell-l{font-size:9px;color:var(--g500);margin-bottom:2px}
.mcell-v{font-size:16px;font-weight:700}
.mcell-s{font-size:9px;font-weight:600}
.link-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;background:var(--bg);border:1px solid var(--g200)}
.link-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.email-card{border-left:4px solid var(--success);overflow:hidden;margin-bottom:12px}
.email-card.pend{border-left-color:var(--yellow)}
.camp-card{padding:20px;cursor:pointer;border-left:4px solid var(--cyan);transition:all .2s}
.camp-card:hover{transform:translateY(-2px);box-shadow:var(--sh-lg)}
.empty{padding:40px;text-align:center;color:var(--g500)}
.empty .icon{font-size:48px;color:var(--g300);display:block;margin-bottom:12px}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(16,41,63,.5);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--white);border-radius:12px;width:90%;max-width:600px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(16,41,63,.3);transform:scale(.95);transition:transform .2s}
.modal-overlay.open .modal{transform:scale(1)}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--g200);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--white);z-index:1;border-radius:12px 12px 0 0}
.modal-header h2{font-size:16px;font-weight:600;color:var(--navy);font-family:'Poppins',sans-serif}
.modal-body{padding:20px}
.modal-footer{padding:12px 20px;border-top:1px solid var(--g200);display:flex;gap:8px;justify-content:flex-end}
.toast{position:fixed;bottom:20px;right:20px;background:var(--navy);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;box-shadow:0 4px 12px rgba(16,41,63,.3);opacity:0;transition:opacity .3s;pointer-events:none;z-index:300}
.toast.show{opacity:1}
.loading{display:flex;align-items:center;justify-content:center;padding:60px}
.spinner{width:36px;height:36px;border:3px solid var(--g200);border-top-color:var(--cyan);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* Timeline */
.tl-wrap{position:relative;padding-left:30px}
.tl-wrap::before{content:'';position:absolute;left:11px;top:0;bottom:0;width:2px;background:var(--g200)}
.tl-item{position:relative;margin-bottom:16px}
.tl-dot{position:absolute;left:-25px;top:4px;width:14px;height:14px;border-radius:50%;border:2px solid var(--white);box-shadow:0 0 0 2px var(--g300)}
.tl-date{font-size:10px;color:var(--g500);font-weight:600;margin-bottom:4px}
.tl-content{background:var(--white);border:1px solid var(--g200);border-radius:8px;padding:12px;box-shadow:var(--sh)}
.tl-content.action{border-left:3px solid var(--cyan)}
.tl-content.result{border-left:3px solid var(--emerald)}
.tl-tag{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.tl-title{font-size:13px;font-weight:600;color:var(--navy)}
.tl-detail{font-size:11px;color:var(--g500);margin-top:2px}
/* Upload area */
.upload-area{border:2px dashed var(--g300);border-radius:8px;padding:30px;text-align:center;cursor:pointer;transition:all .2s}
.upload-area:hover,.upload-area.drag{border-color:var(--cyan);background:var(--cyan-light)}
.upload-area input{display:none}
.footer{margin-top:32px;padding-top:16px;border-top:1px solid var(--g200);text-align:center}
.footer p{font-size:10px;color:var(--g500)}
</style>
</head>
<body>

<header class="topbar">
  <div class="tb-logo"><span class="tb-mark">GMS</span><span class="tb-text">Gestão Mais Simples</span></div>
  <nav class="tb-bc" id="breadcrumb"><span class="a">Campanhas de Marketing</span></nav>
</header>

<div class="container" id="app"><div class="loading"><div class="spinner"></div></div></div>

<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal"><div class="modal-header"><h2 id="modal-title"></h2><button class="btn btn-icon btn-outline" onclick="closeModal()"><span class="icon icon-sm">close</span></button></div>
  <div class="modal-body" id="modal-body"></div><div class="modal-footer" id="modal-footer"></div></div>
</div>
<div class="toast" id="toast"></div>

<script>
const SB_URL='https://rziulhxiwgjcizieqcae.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ6aXVsaHhpd2dqY2l6aWVxY2FlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MDM5OTksImV4cCI6MjA5MDQ3OTk5OX0.UeOfPqM6Gn1zTsnV6WmsNO8uCtdnjux3gEqwUrM2DBM';
const sb=supabase.createClient(SB_URL,SB_KEY);

let view='list',curCamp=null,curTab='timeline',camps=[],emails=[],waps=[],socials=[],results=[];
const $=id=>document.getElementById(id);
const pc=(n,d)=>d>0?(n/d*100).toFixed(1):'0.0';
const fmt=n=>(n||0).toLocaleString('pt-BR');
const ORIGENS={email_campanha:'E-mail',whatsapp:'WhatsApp',rede_social:'Rede Social',indicacao:'Indicação',comercial:'Comercial',google:'Google',outro:'Outro'};
const ORIGEM_COLORS={email_campanha:'#2563EB',whatsapp:'#16A34A',rede_social:'#DB2777',indicacao:'#7C3AED',comercial:'#EA580C',google:'#45E5E5',outro:'#666'};

function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove('show'),2000)}
function openModal(t,b,f){$('modal-title').textContent=t;$('modal-body').innerHTML=b;$('modal-footer').innerHTML=f;$('modal-overlay').classList.add('open')}
function closeModal(){$('modal-overlay').classList.remove('open')}
function setBc(parts){$('breadcrumb').innerHTML=parts.map((p,i)=>i<parts.length-1?`<span onclick="${p.action||''}">${p.label}</span><span style="opacity:.4">›</span>`:`<span class="a">${p.label}</span>`).join('')}

// ==================== DATA ====================
async function loadCamps(){const{data}=await sb.from('campanhas').select('*').order('created_at',{ascending:false});camps=data||[]}
async function loadCampData(id){
  const[e,w,s,r]=await Promise.all([
    sb.from('emails_campanha').select('*').eq('campanha_id',id).order('ordem'),
    sb.from('whatsapp_campanha').select('*').eq('campanha_id',id).order('created_at'),
    sb.from('social_campanha').select('*').eq('campanha_id',id).order('data_publicacao',{ascending:false}),
    sb.from('resultados_campanha').select('*').eq('campanha_id',id).order('data'),
  ]);
  emails=e.data||[];waps=w.data||[];socials=s.data||[];results=r.data||[];
}

// ==================== CAMPAIGNS LIST ====================
function renderList(){
  view='list';curCamp=null;setBc([{label:'Campanhas de Marketing'}]);
  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
    <div><h1 style="font-size:22px;font-weight:700;color:var(--navy);font-family:'Poppins',sans-serif;margin:0">📊 Campanhas de Marketing</h1>
    <p style="font-size:13px;color:var(--g500);margin-top:4px">${camps.length} campanha(s)</p></div>
    <button class="btn btn-primary" onclick="openNewCampModal()"><span class="icon icon-sm">add</span> Nova Campanha</button></div>`;
  if(!camps.length)h+=`<div class="card empty"><span class="icon">campaign</span><p style="font-size:14px;font-weight:500">Nenhuma campanha</p></div>`;
  camps.forEach(c=>{
    const st={ativa:'badge-success',concluida:'badge-info',pausada:'badge-warning',rascunho:'badge-purple'}[c.status]||'badge-info';
    h+=`<div class="card camp-card" onclick="openCamp('${c.id}')" style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div><div style="font-size:16px;font-weight:600;color:var(--navy);font-family:'Poppins',sans-serif">${c.nome}</div>
        ${c.descricao?`<div style="font-size:12px;color:var(--g500);margin-top:4px">${c.descricao}</div>`:''}
        <div style="display:flex;gap:12px;margin-top:10px;font-size:11px;color:var(--g700)">${c.data_inicio?`<span>📅 ${c.data_inicio} → ${c.data_fim||'...'}</span>`:''}<span class="badge ${st}">${c.status}</span></div></div>
        <div style="display:flex;gap:4px" onclick="event.stopPropagation()">
          <button class="btn btn-icon btn-outline btn-sm" onclick="openEditCampModal('${c.id}')"><span class="icon icon-sm">edit</span></button>
          <button class="btn btn-icon btn-danger btn-sm" onclick="delCamp('${c.id}')"><span class="icon icon-sm">delete</span></button></div></div></div>`;
  });
  h+=`<div class="footer"><p>© 2026 Sismais Tecnologia · GMS — Gestão Mais Simples</p></div>`;
  $('app').innerHTML=h;
}

// ==================== CAMPAIGN DETAIL ====================
async function openCamp(id){
  $('app').innerHTML='<div class="loading"><div class="spinner"></div></div>';
  curCamp=camps.find(c=>c.id===id);
  await loadCampData(id);view='detail';curTab='timeline';renderDetail();
}
function renderDetail(){
  const c=curCamp;
  setBc([{label:'Campanhas',action:"goBack()"},{label:c.nome}]);
  let h=`<div style="margin-bottom:8px">
    <button class="btn btn-outline btn-sm" onclick="goBack()" style="margin-bottom:8px"><span class="icon icon-sm">arrow_back</span> Voltar</button>
    <h1 style="font-size:20px;font-weight:700;color:var(--navy);font-family:'Poppins',sans-serif;margin:0">${c.nome}</h1>
    ${c.descricao?`<p style="font-size:12px;color:var(--g500);margin-top:4px">${c.descricao}</p>`:''}</div>`;
  h+=`<div class="tabs">
    <button class="tab ${curTab==='timeline'?'active':''}" onclick="sTab('timeline')">📅 Timeline</button>
    <button class="tab ${curTab==='roi'?'active':''}" onclick="sTab('roi')">📊 ROI</button>
    <button class="tab ${curTab==='emails'?'active':''}" onclick="sTab('emails')">📧 E-mails (${emails.length})</button>
    <button class="tab ${curTab==='whatsapp'?'active':''}" onclick="sTab('whatsapp')">📱 WhatsApp (${waps.length})</button>
    <button class="tab ${curTab==='social'?'active':''}" onclick="sTab('social')">📸 Social (${socials.length})</button>
    <button class="tab ${curTab==='resultados'?'active':''}" onclick="sTab('resultados')">💰 Resultados (${results.length})</button>
  </div>`;
  if(curTab==='timeline')h+=renderTimeline();
  else if(curTab==='roi')h+=renderROI();
  else if(curTab==='emails')h+=renderEmails();
  else if(curTab==='whatsapp')h+=renderWhatsapp();
  else if(curTab==='social')h+=renderSocial();
  else if(curTab==='resultados')h+=renderResultados();
  h+=`<div class="footer"><p>© 2026 Sismais Tecnologia · GMS</p></div>`;
  $('app').innerHTML=h;
  if(curTab==='roi')renderROICharts();
}
function sTab(t){curTab=t;renderDetail()}
function goBack(){renderList()}

// ==================== TIMELINE ====================
function renderTimeline(){
  // Merge all events into timeline
  const events=[];
  emails.forEach(e=>{if(e.data_envio)events.push({date:e.data_envio,type:'action',cat:'email',title:e.nome,detail:`Assunto: "${e.assunto}" · ${fmt(e.enviados)} enviados · ${fmt(e.aberturas)} aberturas`,color:'var(--info)'})});
  waps.forEach(w=>{if(w.data_inicio)events.push({date:w.data_inicio,type:'action',cat:'whatsapp',title:w.nome,detail:`Segmento: ${w.segmento} · ${fmt(w.enviados)} enviados`,color:'var(--success)'})});
  socials.forEach(s=>{if(s.data_publicacao)events.push({date:s.data_publicacao,type:'action',cat:s.tipo,title:s.nome,detail:`${s.tipo==='reel'?'🎬 Reel':'📱 Story'} · ${fmt(s.alcance)} alcance`,color:'var(--pink)'})});
  // Group results by date
  const resByDate={};
  results.forEach(r=>{
    if(!resByDate[r.data])resByDate[r.data]={novas:0,upgrades:0,receita:0,origens:{}};
    const d=resByDate[r.data];
    if(r.tipo==='nova_assinatura')d.novas++;else d.upgrades++;
    d.receita+=Number(r.valor_mensal)||0;
    d.origens[r.origem]=(d.origens[r.origem]||0)+1;
  });
  Object.entries(resByDate).forEach(([date,d])=>{
    const origTxt=Object.entries(d.origens).map(([k,v])=>`${ORIGENS[k]||k}: ${v}`).join(', ');
    events.push({date,type:'result',title:`${d.novas} nova(s) assinatura(s), ${d.upgrades} upgrade(s)`,detail:`Receita: R$ ${d.receita.toFixed(2)} · Origens: ${origTxt}`,color:'var(--emerald)'});
  });
  events.sort((a,b)=>a.date.localeCompare(b.date));

  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <div class="section-title" style="margin:0">📅 Timeline — Ações x Resultados</div></div>`;
  if(!events.length){
    h+=`<div class="card empty"><span class="icon">timeline</span><p style="font-size:14px;font-weight:500">Nenhum evento na timeline</p><p style="font-size:12px">Cadastre e-mails com data de envio e importe resultados para ver a timeline</p></div>`;
    return h;
  }
  h+='<div class="tl-wrap">';
  let lastDate='';
  events.forEach(ev=>{
    const showDate=ev.date!==lastDate;lastDate=ev.date;
    const isResult=ev.type==='result';
    h+=`<div class="tl-item">
      <div class="tl-dot" style="background:${ev.color};box-shadow:0 0 0 2px ${ev.color}"></div>
      ${showDate?`<div class="tl-date">${ev.date}</div>`:''}
      <div class="tl-content ${isResult?'result':'action'}">
        <div class="tl-tag" style="color:${ev.color}">${isResult?'💰 RESULTADO':ev.cat==='email'?'📧 E-MAIL':ev.cat==='whatsapp'?'📱 WHATSAPP':ev.cat==='reel'?'🎬 REEL':'📱 STORY'}</div>
        <div class="tl-title">${ev.title}</div>
        <div class="tl-detail">${ev.detail}</div>
      </div></div>`;
  });
  h+='</div>';
  return h;
}

// ==================== ROI DASHBOARD ====================
function renderROI(){
  const totRes={novas:0,upgrades:0,receita:0};
  const porOrigem={};
  results.forEach(r=>{
    if(r.tipo==='nova_assinatura')totRes.novas++;else totRes.upgrades++;
    totRes.receita+=Number(r.valor_mensal)||0;
    if(!porOrigem[r.origem])porOrigem[r.origem]={novas:0,upgrades:0,receita:0};
    const o=porOrigem[r.origem];
    if(r.tipo==='nova_assinatura')o.novas++;else o.upgrades++;
    o.receita+=Number(r.valor_mensal)||0;
  });
  const totEmails=emails.reduce((a,e)=>a+e.enviados,0);
  const totAb=emails.reduce((a,e)=>a+e.aberturas,0);

  let h=`<div class="section-title">📊 Dashboard de ROI da Campanha</div>`;
  // KPIs
  h+=`<div class="kpi-grid">
    <div class="card kpi" style="border-top-color:var(--emerald)"><div class="kpi-label">💰 Novas Assinaturas</div><div class="kpi-value">${totRes.novas}</div></div>
    <div class="card kpi" style="border-top-color:var(--purple)"><div class="kpi-label">⬆️ Upgrades</div><div class="kpi-value">${totRes.upgrades}</div></div>

    <div class="card kpi" style="border-top-color:var(--info)"><div class="kpi-label">📧 E-mails Enviados</div><div class="kpi-value">${fmt(totEmails)}</div></div>
    <div class="card kpi" style="border-top-color:var(--cyan)"><div class="kpi-label">👁️ Aberturas</div><div class="kpi-value">${fmt(totAb)}</div><div class="kpi-sub" style="color:var(--cyan)">${pc(totAb,totEmails)}%</div></div>
    <div class="card kpi" style="border-top-color:var(--navy)"><div class="kpi-label">📈 Conv. Total</div><div class="kpi-value">${totRes.novas+totRes.upgrades}</div><div class="kpi-sub" style="color:var(--navy)">${pc(totRes.novas+totRes.upgrades,totAb)}% das aberturas</div></div>
  </div>`;

  // Charts
  h+=`<div class="grid-2" style="margin-top:20px">
    <div class="card" style="padding:20px"><div class="section-title" style="margin:0 0 12px">Resultados por Origem</div><canvas id="chart-origem" height="220"></canvas></div>
    <div class="card" style="padding:20px"><div class="section-title" style="margin:0 0 12px">Resultados ao Longo do Tempo</div><canvas id="chart-tempo" height="220"></canvas></div>
  </div>`;

  // Table by origin
  h+=`<div class="card" style="padding:20px;margin-top:16px"><div class="section-title" style="margin:0 0 12px">Detalhamento por Origem</div>
    <table style="width:100%;border-collapse:collapse;font-size:12px">

  Object.entries(porOrigem).sort((a,b)=>(b[1].novas+b[1].upgrades)-(a[1].novas+a[1].upgrades)).forEach(([k,v])=>{
    h+=`<tr style="border-bottom:1px solid var(--g100)"><td style="padding:8px 12px"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${ORIGEM_COLORS[k]||'#666'};margin-right:6px"></span>${ORIGENS[k]||k}</td><td style="padding:8px 12px;text-align:center;font-weight:600;color:var(--emerald)">${v.novas}</td><td style="padding:8px 12px;text-align:center;font-weight:600;color:var(--purple)">${v.upgrades}</td><td style="padding:8px 12px;text-align:center;font-weight:700">${v.novas+v.upgrades}</td><td style="padding:8px 12px;text-align:right;font-weight:600;color:var(--emerald)">R$ ${v.receita.toFixed(2)}</td></tr>`;
  });
  if(!Object.keys(porOrigem).length)h+=`<tr><td colspan="5" style="padding:20px;text-align:center;color:var(--g500)">Importe resultados na aba "Resultados"</td></tr>`;
  h+=`</tbody></table></div>`;
  return h;
}

function renderROICharts(){
  // Origem chart
  const porOrigem={};
  results.forEach(r=>{porOrigem[r.origem]=(porOrigem[r.origem]||0)+1});
  const origLabels=Object.keys(porOrigem).map(k=>ORIGENS[k]||k);
  const origData=Object.values(porOrigem);
  const origColors=Object.keys(porOrigem).map(k=>ORIGEM_COLORS[k]||'#666');
  const ctx1=document.getElementById('chart-origem');
  if(ctx1&&origLabels.length){new Chart(ctx1,{type:'doughnut',data:{labels:origLabels,datasets:[{data:origData,backgroundColor:origColors,borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{size:11}}}}}})}

  // Tempo chart
  const porDia={};
  results.forEach(r=>{porDia[r.data]=(porDia[r.data]||0)+1});
  const dias=Object.keys(porDia).sort();
  const ctx2=document.getElementById('chart-tempo');
  if(ctx2&&dias.length){new Chart(ctx2,{type:'bar',data:{labels:dias,datasets:[{label:'Conversões',data:dias.map(d=>porDia[d]),backgroundColor:'#059669',borderRadius:4}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}},x:{ticks:{font:{size:10}}}}}})}
}

    h+=`<div class="card kpi" style="border-top-color:${k.c}"><div class="kpi-label">${k.i} ${k.l}</div><div class="kpi-value">${fmt(k.v)}</div>${k.s?`<div class="kpi-sub" style="color:${k.c}">${k.s}</div>`:''}</div>`;

    const stCls=isSent?'badge-success':em.status==='pendente'?'badge-warning':'badge-purple';

    h+=`<div class="card email-card ${isSent?'':'pend'}">
      <div style="padding:12px 16px;border-bottom:1px solid var(--g100);display:flex;justify-content:space-between">
        <div><div style="display:flex;align-items:center;gap:8px"><span style="font-size:13px;font-weight:600;color:var(--navy)">${em.nome}</span><span class="badge ${stCls}">${stLbl}</span></div>
        <div style="font-size:11px;color:var(--g500);margin-top:3px">"${em.assunto}"${em.data_envio?` · 📅 ${em.data_envio}`:''}</div></div>
        <div style="display:flex;gap:4px"><button class="btn btn-icon btn-outline btn-sm" onclick="openEditEmailModal('${em.id}')"><span class="icon icon-sm">edit</span></button><button class="btn btn-icon btn-danger btn-sm" onclick="delEmail('${em.id}')"><span class="icon icon-sm">delete</span></button></div></div>`;
    if(em.enviados>0){
      h+=`<div style="padding:10px 16px;display:grid;grid-template-columns:repeat(auto-fit,minmax(75px,1fr));gap:6px">`;
      [{l:'Enviados',v:em.enviados,c:'var(--navy)'},{l:'Aberturas',v:em.aberturas,s:oR+'%',c:'var(--cyan)'},{l:'Cliques',v:em.cliques,s:cR+'%',c:'var(--purple)'},{l:'Vendas',v:em.vendas,c:'var(--emerald)'},{l:'Bounces',v:em.bounces,c:'var(--yellow)'},{l:'Unsubs',v:em.unsubs,c:'var(--error)'}].forEach(m=>{
        h+=`<div class="mcell"><div class="mcell-l">${m.l}</div><div class="mcell-v" style="color:${m.c}">${fmt(m.v)}</div>${m.s?`<div class="mcell-s" style="color:${m.c}">${m.s}</div>`:''}</div>`;
      });
      h+='</div>';
      if(em.cliques>0||em.cliques_venda>0||em.cliques_midia>0){
        h+=`<div style="padding:0 16px 10px"><div style="font-size:10px;color:var(--g500);font-weight:600;text-transform:uppercase;margin-bottom:5px">🔗 Cliques por Link</div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:5px">`;

        });
        h+='</div></div>';
      }
    }
    h+='</div>';
  });
  h+='</div>';return h;
}

// Campaign
function openNewCampModal(){openModal('Nova Campanha',`<div style="display:flex;flex-direction:column;gap:12px"><div><label>Nome</label><input id="m-c-nome" placeholder="Ex: Maio 2026 - Monitor de XML"></div><div><label>Descrição</label><textarea id="m-c-desc"></textarea></div><div class="grid-2"><div><label>Início</label><input type="date" id="m-c-ini"></div><div><label>Fim</label><input type="date" id="m-c-fim"></div></div><div><label>Status</label><select id="m-c-st"><option value="ativa">Ativa</option><option value="rascunho">Rascunho</option><option value="pausada">Pausada</option><option value="concluida">Concluída</option></select></div></div>`,`<button class="btn btn-outline" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveCamp()">Criar</button>`)}
function openEditCampModal(id){const c=camps.find(x=>x.id===id);openModal('Editar Campanha',`<div style="display:flex;flex-direction:column;gap:12px"><div><label>Nome</label><input id="m-c-nome" value="${c.nome}"></div><div><label>Descrição</label><textarea id="m-c-desc">${c.descricao||''}</textarea></div><div class="grid-2"><div><label>Início</label><input type="date" id="m-c-ini" value="${c.data_inicio||''}"></div><div><label>Fim</label><input type="date" id="m-c-fim" value="${c.data_fim||''}"></div></div><div><label>Status</label><select id="m-c-st"><option value="ativa" ${c.status==='ativa'?'selected':''}>Ativa</option><option value="rascunho" ${c.status==='rascunho'?'selected':''}>Rascunho</option><option value="pausada" ${c.status==='pausada'?'selected':''}>Pausada</option><option value="concluida" ${c.status==='concluida'?'selected':''}>Concluída</option></select></div></div>`,`<button class="btn btn-outline" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="updCamp('${id}')">Salvar</button>`)}
async function saveCamp(){const d={nome:$('m-c-nome').value,descricao:$('m-c-desc').value,data_inicio:$('m-c-ini').value||null,data_fim:$('m-c-fim').value||null,status:$('m-c-st').value};if(!d.nome){toast('Preencha o nome');return}await sb.from('campanhas').insert(d);closeModal();toast('Criada!');await loadCamps();renderList()}
async function updCamp(id){const d={nome:$('m-c-nome').value,descricao:$('m-c-desc').value,data_inicio:$('m-c-ini').value||null,data_fim:$('m-c-fim').value||null,status:$('m-c-st').value};await sb.from('campanhas').update(d).eq('id',id);closeModal();toast('Atualizada!');await loadCamps();renderList()}

// CSV Upload
function openCSVModal(){
  openModal('Importar CSV de Resultados',`
    <div style="margin-bottom:16px">
      <p style="font-size:13px;color:var(--g700);margin-bottom:8px">O CSV deve ter as colunas:</p>
      <div class="card" style="padding:12px;font-family:monospace;font-size:11px;background:var(--bg)">data,tipo,plano,valor_mensal,origem<br>2026-03-19,nova_assinatura,PRO,99.90,email_campanha<br>2026-03-21,upgrade,PRO,99.90,indicacao</div>
      <p style="font-size:11px;color:var(--g500);margin-top:8px"><strong>Origens válidas:</strong> email_campanha, whatsapp, rede_social, indicacao, comercial, google, outro</p>
      <p style="font-size:11px;color:var(--g500)"><strong>Tipos válidos:</strong> nova_assinatura, upgrade</p>
    </div>
    <div class="upload-area" id="csv-drop" onclick="document.getElementById('csv-file').click()" ondragover="event.preventDefault();this.classList.add('drag')" ondragleave="this.classList.remove('drag')" ondrop="event.preventDefault();this.classList.remove('drag');handleCSV(event.dataTransfer.files[0])">
      <span class="icon icon-lg" style="color:var(--g300);display:block;margin-bottom:8px">upload_file</span>
      <p style="font-size:14px;font-weight:500;color:var(--g700)">Arraste o CSV aqui ou clique para selecionar</p>
      <p style="font-size:11px;color:var(--g500)">Aceita .csv e .txt</p>
      <input type="file" id="csv-file" accept=".csv,.txt" onchange="handleCSV(this.files[0])">
    </div>
    <div id="csv-preview" style="margin-top:16px"></div>`,
    `<button class="btn btn-outline" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" id="csv-confirm-btn" onclick="confirmCSV()" disabled>Importar</button>`);
}

let csvRows=[];
function handleCSV(file){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    const lines=e.target.result.split('\n').map(l=>l.trim()).filter(l=>l);
    if(lines.length<2){toast('CSV vazio');return}
    const header=lines[0].toLowerCase().split(/[,;\t]/);
    const iData=header.findIndex(h=>h.includes('data'));
    const iTipo=header.findIndex(h=>h.includes('tipo'));
    const iPlano=header.findIndex(h=>h.includes('plano'));
    const iValor=header.findIndex(h=>h.includes('valor'));
    const iOrigem=header.findIndex(h=>h.includes('origem'));
    if(iData<0||iTipo<0){toast('CSV precisa ter colunas "data" e "tipo"');return}
    csvRows=[];
    for(let i=1;i<lines.length;i++){
      const cols=lines[i].split(/[,;\t]/);
      if(cols.length<2)continue;
      csvRows.push({data:cols[iData]?.trim(),tipo:cols[iTipo]?.trim(),plano:iPlano>=0?cols[iPlano]?.trim():'',valor_mensal:iValor>=0?parseFloat(cols[iValor])||0:0,origem:iOrigem>=0?cols[iOrigem]?.trim():'outro'});
    }
    $('csv-preview').innerHTML=`<div class="card" style="padding:12px"><p style="font-size:13px;font-weight:600;color:var(--navy);margin-bottom:8px">✅ ${csvRows.length} registro(s) encontrado(s)</p><div style="max-height:200px;overflow-y:auto"><table style="width:100%;font-size:11px;border-collapse:collapse"><thead><tr style="background:var(--g100)"><th style="padding:4px 8px;text-align:left">Data</th><th style="padding:4px 8px">Tipo</th><th style="padding:4px 8px">Plano</th><th style="padding:4px 8px">Valor</th><th style="padding:4px 8px">Origem</th></tr></thead><tbody>${csvRows.map(r=>`<tr style="border-bottom:1px solid var(--g100)"><td style="padding:4px 8px">${r.data}</td><td style="padding:4px 8px">${r.tipo}</td><td style="padding:4px 8px">${r.plano}</td><td style="padding:4px 8px">R$ ${r.valor_mensal.toFixed(2)}</td><td style="padding:4px 8px">${r.origem}</td></tr>`).join('')}</tbody></table></div></div>`;
    $('csv-confirm-btn').disabled=false;
  };
  reader.readAsText(file);
}
async function confirmCSV(){
  if(!csvRows.length)return;
  const rows=csvRows.map(r=>({...r,campanha_id:curCamp.id}));
  const{error}=await sb.from('resultados_campanha').insert(rows);
  if(error){toast('Erro: '+error.message);return}
  closeModal();toast(`${rows.length} resultado(s) importado(s)!`);csvRows=[];
  await loadCampData(curCamp.id);renderDetail();
}
