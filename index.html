<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GMS — Marketing Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#10293F;--navy2:#1a3d5c;--cyan:#45E5E5;--cyan2:#2ecece;--cl:#E8F9F9;--yellow:#FFB800;--w:#FFF;--bg:#F8FAFC;--g50:#FAFAFA;--g100:#F5F5F5;--g200:#E5E5E5;--g300:#CCC;--g500:#666;--g700:#444;--g900:#333;--err:#DC2626;--errbg:#FEF2F2;--ok:#16A34A;--okbg:#F0FDF4;--info:#2563EB;--infobg:#EFF6FF;--purp:#7C3AED;--orange:#EA580C;--pink:#DB2777;--em:#059669;--sh:0 1px 3px rgba(16,41,63,.08);--shl:0 4px 12px rgba(16,41,63,.12);--shxl:0 8px 24px rgba(16,41,63,.15)}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--g900);min-height:100vh}
.i{font-family:'Material Symbols Rounded';font-size:20px;font-style:normal;line-height:1;user-select:none;vertical-align:middle}
.is{font-size:16px}.il{font-size:24px}

/* Topbar */
.top{height:56px;background:var(--navy);display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(16,41,63,.2)}
.tl{display:flex;align-items:center;gap:10px;flex-shrink:0}
.tm{background:var(--cyan);color:var(--navy);font-weight:700;font-size:14px;padding:4px 8px;border-radius:5px}
.tt{color:#fff;font-size:14px;opacity:.9;font-weight:500}
.tb{flex:1;font-size:13px;color:rgba(255,255,255,.55);display:flex;align-items:center;gap:4px}
.tb .a{color:#fff;font-weight:500}
.tb span[onclick]{cursor:pointer}.tb span[onclick]:hover{color:var(--cyan)}

/* Main nav */
.nav{display:flex;gap:4px;padding:20px 0 0;margin-bottom:0}
.nav-btn{padding:10px 20px;font-size:13px;font-weight:500;color:var(--g500);background:var(--w);border:1px solid var(--g200);border-bottom:none;border-radius:8px 8px 0 0;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:6px}
.nav-btn.active{color:var(--navy);font-weight:600;background:var(--w);border-color:var(--g200);box-shadow:0 -2px 8px rgba(16,41,63,.06);position:relative}
.nav-btn.active::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:var(--w)}
.nav-btn:hover{color:var(--navy)}
.nav-panel{background:var(--w);border:1px solid var(--g200);border-radius:0 8px 8px 8px;padding:24px;box-shadow:var(--sh);min-height:200px}

.ct{max-width:1200px;margin:0 auto;padding:24px 20px}
.card{background:var(--w);border-radius:10px;box-shadow:var(--sh);border:1px solid var(--g200);transition:all .2s}
.card:hover{box-shadow:var(--shl)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:7px;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:all .15s;font-family:inherit}
.bp{background:var(--cyan);color:var(--navy)}.bp:hover{background:var(--cyan2)}
.bn{background:var(--navy);color:#fff}.bn:hover{background:var(--navy2)}
.bo{background:transparent;border:1px solid var(--g300);color:var(--g700)}.bo:hover{border-color:var(--cyan);color:var(--navy)}
.bd{background:transparent;border:1px solid var(--err);color:var(--err)}.bd:hover{background:var(--errbg)}
.bs{padding:5px 12px;font-size:11px}
.bi{padding:6px;min-width:32px;min-height:32px;justify-content:center}
input,select,textarea{width:100%;padding:8px 12px;border-radius:7px;border:1px solid var(--g300);font-size:13px;font-family:inherit;outline:none;transition:border .15s}
input:focus,select:focus,textarea:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(69,229,229,.15)}
select{cursor:pointer}textarea{resize:vertical;min-height:60px}
label{font-size:11px;color:var(--g500);font-weight:500;margin-bottom:3px;display:block}
.badge{display:inline-flex;padding:3px 10px;border-radius:9999px;font-size:10px;font-weight:600}
.b-ok{background:var(--okbg);color:var(--ok);border:1px solid rgba(22,163,74,.3)}
.b-warn{background:#FFFBEB;color:#92400E;border:1px solid rgba(255,184,0,.5)}
.b-err{background:var(--errbg);color:var(--err);border:1px solid rgba(220,38,38,.3)}
.b-info{background:var(--infobg);color:var(--info);border:1px solid rgba(37,99,235,.3)}
.b-purp{background:#F5F3FF;color:var(--purp);border:1px solid rgba(124,58,237,.3)}
.b-pink{background:#FDF2F8;color:var(--pink);border:1px solid rgba(219,39,119,.3)}
.tabs{display:flex;gap:0;border-bottom:2px solid var(--g200);margin:20px 0;flex-wrap:wrap}
.tab{padding:10px 16px;font-size:13px;font-weight:400;color:var(--g500);background:0;border:0;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;font-family:inherit;transition:all .15s;white-space:nowrap}
.tab.active{color:var(--navy);font-weight:600;border-bottom-color:var(--cyan)}
.tab:hover{color:var(--navy)}
.kg{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px}
.kpi{padding:14px 16px;border-top:3px solid var(--navy)}
.kl{font-size:10px;color:var(--g500);margin-bottom:4px;font-weight:500}
.kv{font-size:22px;font-weight:700;color:var(--navy);line-height:1}
.ks{font-size:10px;font-weight:600;margin-top:3px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:768px){.g2,.g3{grid-template-columns:1fr}.nav{flex-wrap:wrap}}
.st{font-size:14px;font-weight:600;color:var(--navy);margin-bottom:14px;font-family:'Poppins',sans-serif}
.sd{font-size:11px;color:var(--g500);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin:14px 0 8px;padding:8px 0;border-bottom:1px dashed var(--g200)}
.mc{text-align:center;padding:6px 4px;border-radius:6px;background:var(--bg)}
.ml{font-size:9px;color:var(--g500);margin-bottom:2px}.mv{font-size:16px;font-weight:700}.ms{font-size:9px;font-weight:600}
.li{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;background:var(--bg);border:1px solid var(--g200)}
.ld{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ec{border-left:4px solid var(--ok);overflow:hidden;margin-bottom:12px}.ec.pend{border-left-color:var(--yellow)}
.cc{padding:20px;cursor:pointer;border-left:4px solid var(--cyan);transition:all .2s}.cc:hover{transform:translateY(-2px);box-shadow:var(--shl)}
.fc{padding:20px;cursor:pointer;border-left:4px solid var(--purp);transition:all .2s}.fc:hover{transform:translateY(-2px);box-shadow:var(--shl)}
.emp{padding:40px;text-align:center;color:var(--g500)}
.emp .i{font-size:48px;color:var(--g300);display:block;margin-bottom:12px}
.mo{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(16,41,63,.5);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.mo.open{opacity:1;pointer-events:all}
.md{background:var(--w);border-radius:14px;width:90%;max-width:620px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(16,41,63,.3);transform:scale(.95);transition:transform .2s}
.mo.open .md{transform:scale(1)}
.mh{padding:16px 20px;border-bottom:1px solid var(--g200);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--w);z-index:1;border-radius:14px 14px 0 0}
.mh h2{font-size:16px;font-weight:600;color:var(--navy);font-family:'Poppins',sans-serif}
.mb{padding:20px}.mf{padding:12px 20px;border-top:1px solid var(--g200);display:flex;gap:8px;justify-content:flex-end}
.toast{position:fixed;bottom:20px;right:20px;background:var(--navy);color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:var(--shxl);opacity:0;transition:opacity .3s;pointer-events:none;z-index:300;display:flex;align-items:center;gap:8px}
.toast.show{opacity:1}
.ld2{display:flex;align-items:center;justify-content:center;padding:60px}
.sp{width:36px;height:36px;border:3px solid var(--g200);border-top-color:var(--cyan);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* Timeline */
.tw{position:relative;padding-left:30px}.tw::before{content:'';position:absolute;left:11px;top:0;bottom:0;width:2px;background:var(--g200)}
.ti{position:relative;margin-bottom:16px}
.tdot{position:absolute;left:-25px;top:4px;width:14px;height:14px;border-radius:50%;border:2px solid var(--w);box-shadow:0 0 0 2px var(--g300)}
.tdt{font-size:10px;color:var(--g500);font-weight:600;margin-bottom:4px}
.tc{background:var(--w);border:1px solid var(--g200);border-radius:8px;padding:12px;box-shadow:var(--sh)}
.tc.act{border-left:3px solid var(--cyan)}.tc.res{border-left:3px solid var(--em)}
.ttg{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.ttt{font-size:13px;font-weight:600;color:var(--navy)}.ttd{font-size:11px;color:var(--g500);margin-top:2px}
/* Upload */
.ua{border:2px dashed var(--g300);border-radius:8px;padding:30px;text-align:center;cursor:pointer;transition:all .2s}
.ua:hover,.ua.drag{border-color:var(--cyan);background:var(--cl)}.ua input{display:none}
/* Feature detail */
.feat-hero{background:linear-gradient(135deg,#10293F,#1a3d5c);border-radius:12px;padding:24px;color:#fff;margin-bottom:20px}
.ft{margin-top:32px;padding-top:16px;border-top:1px solid var(--g200);text-align:center}
.ft p{font-size:10px;color:var(--g500)}
@media print{.top,.nav,.btn,.no-print{display:none!important}body{background:#fff}}
</style>
</head>
<body>

<header class="top">
  <div class="tl"><span class="tm">GMS</span><span class="tt">Marketing Intelligence</span></div>
  <nav class="tb" id="bc"><span class="a">Painel de Marketing</span></nav>
</header>

<div class="ct" id="app"><div class="ld2"><div class="sp"></div></div></div>
<div class="mo" id="mo" onclick="if(event.target===this)cm()"><div class="md"><div class="mh"><h2 id="mt"></h2><button class="btn bi bo" onclick="cm()"><span class="i is">close</span></button></div><div class="mb" id="mmb"></div><div class="mf" id="mmf"></div></div></div>
<div class="toast" id="tst"></div>

<script>
const SB='https://rziulhxiwgjcizieqcae.supabase.co',SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ6aXVsaHhpd2dqY2l6aWVxY2FlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MDM5OTksImV4cCI6MjA5MDQ3OTk5OX0.UeOfPqM6Gn1zTsnV6WmsNO8uCtdnjux3gEqwUrM2DBM';
const db=supabase.createClient(SB,SK);
let vw='home',mainTab='dashboard',cCamp=null,cTab='timeline',cFeat=null,fTab='overview';
let camps=[],ems=[],wps=[],socs=[],ress=[],feats=[],fLinks=[],fFbs=[],ocors=[],allRes=[];
const $=id=>document.getElementById(id),P=(n,d)=>d>0?(n/d*100).toFixed(1):'0.0',F=n=>(n||0).toLocaleString('pt-BR');
const ORI={email_campanha:'E-mail',whatsapp:'WhatsApp',rede_social:'Rede Social',indicacao:'Indicação',comercial:'Comercial',google:'Google',outro:'Outro'};

const OCOR_TIPOS={promocao:'Promoção/Oferta',ausencia:'Ausência/Férias',problema_tecnico:'Problema Técnico',evento_externo:'Evento Externo',mudanca_preco:'Mudança de Preço',concorrente:'Concorrente',leads:'Leads',mudanca_time:'Mudança no Time',outro:'Outro'};
const OCOR_ICONS={promocao:'sell',ausencia:'person_off',problema_tecnico:'error',evento_externo:'event',mudanca_preco:'price_change',concorrente:'groups',leads:'trending_up',mudanca_time:'swap_horiz',outro:'more_horiz'};
const OCOR_COLORS={promocao:'var(--cyan)',ausencia:'var(--orange)',problema_tecnico:'var(--err)',evento_externo:'var(--info)',mudanca_preco:'var(--yellow)',concorrente:'var(--pink)',leads:'var(--purp)',mudanca_time:'var(--navy)',outro:'var(--g500)'};
const IMPACTO_BADGE={positivo:'b-ok',negativo:'b-err',neutro:'b-info'};
const ORIC={email_campanha:'#2563EB',whatsapp:'#16A34A',rede_social:'#DB2777',indicacao:'#7C3AED',comercial:'#EA580C',google:'#45E5E5',outro:'#666'};
function tst(m){const t=$('tst');t.innerHTML=`<span class="i is">check_circle</span>${m}`;t.classList.add('show');clearTimeout(window._t);window._t=setTimeout(()=>t.classList.remove('show'),2500)}
function om(t,b,f){$('mt').textContent=t;$('mmb').innerHTML=b;$('mmf').innerHTML=f;$('mo').classList.add('open')}
function cm(){$('mo').classList.remove('open')}
function sb2(p){$('bc').innerHTML=p.map((x,i)=>i<p.length-1?`<span onclick="${x.a||''}">${x.l}</span><span style="opacity:.4">›</span>`:`<span class="a">${x.l}</span>`).join('')}

// DATA
async function ldCamps(){const{data}=await db.from('campanhas').select('*').order('created_at',{ascending:false});camps=data||[]}
async function ldOcors(){const{data}=await db.from('ocorrencias').select('*').order('data_inicio',{ascending:false});ocors=data||[]}
async function ldAllRes(){const{data}=await db.from('resultados_campanha').select('*').order('data',{ascending:false});allRes=data||[]}
async function ldFeats(){const{data}=await db.from('features').select('*').order('created_at',{ascending:false});feats=data||[]}
async function ldCampD(id){const[e,w,s,r]=await Promise.all([db.from('emails_campanha').select('*').eq('campanha_id',id).order('ordem'),db.from('whatsapp_campanha').select('*').eq('campanha_id',id).order('created_at'),db.from('social_campanha').select('*').eq('campanha_id',id).order('data_publicacao',{ascending:false}),db.from('resultados_campanha').select('*').eq('campanha_id',id).order('data')]);ems=e.data||[];wps=w.data||[];socs=s.data||[];ress=r.data||[]}
async function ldFeatD(id){const[l,f]=await Promise.all([db.from('feature_campanhas').select('*,campanhas(*)').eq('feature_id',id),db.from('feature_feedbacks').select('*').eq('feature_id',id).order('data',{ascending:false})]);fLinks=l.data||[];fFbs=f.data||[]}

// ==================== HOME ====================
function rHome(){
  vw='home';cCamp=null;cFeat=null;sb2([{l:'Painel de Marketing'}]);
  let h=`<div style="margin-bottom:20px"><h1 style="font-size:24px;font-weight:700;color:var(--navy);font-family:'Poppins',sans-serif;margin:0">📊 Marketing Intelligence</h1><p style="font-size:13px;color:var(--g500);margin-top:4px">Gerencie campanhas, features e resultados em um só lugar</p></div>`;
  // Nav tabs
  h+=`<div class="nav">
    <button class="nav-btn ${mainTab==='dashboard'?'active':''}" onclick="mainTab='dashboard';rHome()"><span class="i is">dashboard</span> Dashboard</button>
    <button class="nav-btn ${mainTab==='campanhas'?'active':''}" onclick="mainTab='campanhas';rHome()"><span class="i is">campaign</span> Campanhas (${camps.length})</button>
    <button class="nav-btn ${mainTab==='features'?'active':''}" onclick="mainTab='features';rHome()"><span class="i is">extension</span> Features (${feats.length})</button>
    <button class="nav-btn ${mainTab==='comparativo'?'active':''}" onclick="mainTab='comparativo';rHome()"><span class="i is">compare_arrows</span> Comparativo</button>
    <button class="nav-btn ${mainTab==='ocorrencias'?'active':''}" onclick="mainTab='ocorrencias';rHome()"><span class="i is">event_note</span> Ocorrências (${ocors.length})</button>
  </div><div class="nav-panel">`;
  if(mainTab==='dashboard')h+=rDashboard();
  else if(mainTab==='campanhas')h+=rCampList();
  else if(mainTab==='features')h+=rFeatList();
  else if(mainTab==='comparativo')h+=rComparativo();
  else if(mainTab==='ocorrencias')h+=rOcorrencias();
  h+=`</div><div class="ft"><p>© 2026 Sismais Tecnologia · GMS — Gestão Mais Simples</p></div>`;
  $('app').innerHTML=h;
  if(mainTab==='comparativo')renderCompCharts();
  if(mainTab==='dashboard')renderDashCharts();
}

// CAMPAIGNS LIST
function rCampList(){
  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><div class="st" style="margin:0">Campanhas de Marketing</div><button class="btn bp" onclick="omNewCamp()"><span class="i is">add</span> Nova Campanha</button></div>`;
  if(!camps.length)return h+`<div class="card emp"><span class="i">campaign</span><p style="font-size:14px;font-weight:500">Nenhuma campanha</p></div>`;
  camps.forEach(c=>{
    const st={ativa:'b-ok',concluida:'b-info',pausada:'b-warn',rascunho:'b-purp'}[c.status]||'b-info';
    h+=`<div class="card cc" onclick="oCamp('${c.id}')" style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div>
      <div style="font-size:16px;font-weight:600;color:var(--navy);font-family:'Poppins',sans-serif">${c.nome}</div>
      ${c.descricao?`<div style="font-size:12px;color:var(--g500);margin-top:4px">${c.descricao}</div>`:''}
      <div style="display:flex;gap:12px;margin-top:10px;font-size:11px;color:var(--g700);align-items:center">${c.data_inicio?`<span>📅 ${c.data_inicio} → ${c.data_fim||'...'}</span>`:''}<span class="badge ${st}">${c.status}</span></div></div>
      <div style="display:flex;gap:4px" onclick="event.stopPropagation()">
        <button class="btn bi bo bs" onclick="omEditCamp('${c.id}')"><span class="i is">edit</span></button>
        <button class="btn bi bd bs" onclick="dCamp('${c.id}')"><span class="i is">delete</span></button></div></div></div>`;
  });
  return h;
}

// FEATURES LIST
function rFeatList(){
  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><div class="st" style="margin:0">Features do GMS</div><button class="btn bp" onclick="omNewFeat()"><span class="i is">add</span> Nova Feature</button></div>`;
  if(!feats.length)return h+`<div class="card emp"><span class="i">extension</span><p>Nenhuma feature</p></div>`;
  feats.forEach(f=>{
    const st={lancada:'b-ok',em_desenvolvimento:'b-warn',em_teste:'b-info',descontinuada:'b-err'}[f.status]||'b-info';
    const stL={lancada:'Lançada',em_desenvolvimento:'Em desenvolvimento',em_teste:'Em teste',descontinuada:'Descontinuada'}[f.status]||f.status;
    h+=`<div class="card fc" onclick="oFeat('${f.id}')" style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div>
      <div style="font-size:16px;font-weight:600;color:var(--navy);font-family:'Poppins',sans-serif">${f.nome}</div>
      ${f.descricao?`<div style="font-size:12px;color:var(--g500);margin-top:4px">${f.descricao}</div>`:''}
      <div style="display:flex;gap:12px;margin-top:10px;font-size:11px;color:var(--g700);align-items:center">${f.data_lancamento?`<span>🚀 Lançada em ${f.data_lancamento}</span>`:''}<span class="badge ${st}">${stL}</span></div></div>
      <div style="display:flex;gap:4px" onclick="event.stopPropagation()">
        <button class="btn bi bo bs" onclick="omEditFeat('${f.id}')"><span class="i is">edit</span></button>
        <button class="btn bi bd bs" onclick="dFeat('${f.id}')"><span class="i is">delete</span></button></div></div></div>`;
  });
  return h;
}

// COMPARATIVO MENSAL COMPLETO
function rComparativo(){
  let h=`<div class="st">📊 Comparativo Mensal — Visão Completa</div><p style="font-size:12px;color:var(--g500);margin-bottom:16px">Tudo que foi feito e o resultado de cada mês</p>`;

  // Coletar dados de todos os meses
  const months={};
  // Campanhas
  camps.forEach(c=>{if(c.data_inicio){const m=c.data_inicio.substring(0,7);if(!months[m])months[m]={camps:0,emails_env:0,emails_ab:0,emails_cl:0,wap_env:0,wap_cl:0,wap_ve:0,reels:0,stories:0,social_alc:0,social_eng:0,novas:0,ups:0,receita:0,ocor_pos:0,ocor_neg:0};months[m].camps++}});
  // Resultados
  allRes.forEach(r=>{const m=r.data.substring(0,7);if(!months[m])months[m]={camps:0,emails_env:0,emails_ab:0,emails_cl:0,wap_env:0,wap_cl:0,wap_ve:0,reels:0,stories:0,social_alc:0,social_eng:0,novas:0,ups:0,receita:0,ocor_pos:0,ocor_neg:0};if(r.tipo==='nova_assinatura')months[m].novas++;else months[m].ups++;months[m].receita+=Number(r.valor_mensal||0)});
  // Ocorrências

// TIMELINE
function rTimeline(){
  const ev=[];
  ems.forEach(e=>{if(e.data_envio)ev.push({d:e.data_envio,t:'act',cat:'📧',title:e.nome,det:`${F(e.enviados)} enviados · ${F(e.aberturas)} aberturas`,c:'var(--info)'})});
  wps.forEach(w=>{if(w.data_inicio)ev.push({d:w.data_inicio,t:'act',cat:'📱',title:w.nome,det:`Seg: ${w.segmento} · ${F(w.enviados)} enviados`,c:'var(--ok)'})});
  socs.forEach(s=>{if(s.data_publicacao)ev.push({d:s.data_publicacao,t:'act',cat:s.tipo==='reel'?'🎬':'📱',title:s.nome,det:`${F(s.alcance)} alcance`,c:'var(--pink)'})});
  const rd={};
  ress.forEach(r=>{if(!rd[r.data])rd[r.data]={n:0,u:0,rc:0,o:{}};const x=rd[r.data];if(r.tipo==='nova_assinatura')x.n++;else x.u++;x.rc+=Number(r.valor_mensal)||0;x.o[r.origem]=(x.o[r.origem]||0)+1});
  Object.entries(rd).forEach(([d,x])=>{const ot=Object.entries(x.o).map(([k,v])=>`${ORI[k]||k}: ${v}`).join(', ');ev.push({d,t:'res',cat:'💰',title:`${x.n} nova(s), ${x.u} upgrade(s)`,det:`R$ ${x.rc.toFixed(2)} · ${ot}`,c:'var(--em)'})});
  // Adicionar ocorrências do período
  const cIni=cCamp.data_inicio,cFim=cCamp.data_fim;
  ocors.forEach(o=>{
    const oIni=o.data_inicio,oFim=o.data_fim||o.data_inicio;
    if(!cIni||!cFim||(oIni<=cFim&&oFim>=cIni)){
      const impEmoji={positivo:'🟢',negativo:'🔴',neutro:'🔵'}[o.impacto]||'🔵';
      ev.push({d:o.data_inicio,t:'ocor',cat:impEmoji+' '+(OCOR_TIPOS[o.tipo]||'Outro'),title:o.titulo,det:o.descricao||'',c:OCOR_COLORS[o.tipo]||'var(--g500)'});
    }
  });
  ev.sort((a,b)=>a.d.localeCompare(b.d));
  let h=`<div class="st">📅 Timeline — Ações x Resultados</div>`;
  if(!ev.length)return h+`<div class="card emp"><span class="i">timeline</span><p style="font-weight:500">Nenhum evento</p><p style="font-size:12px">Cadastre e-mails com data e importe resultados</p></div>`;
  h+='<div class="tw">';let ld='';
  ev.forEach(e=>{const sd=e.d!==ld;ld=e.d;h+=`<div class="ti"><div class="tdot" style="background:${e.c};box-shadow:0 0 0 2px ${e.c}"></div>${sd?`<div class="tdt">${e.d}</div>`:''}<div class="tc ${e.t==='res'?'res':e.t==='ocor'?'':'act'}" ${e.t==='ocor'?'style="border-left:3px solid '+e.c+';background:var(--g50)"':''}><div class="ttg" style="color:${e.c}">${e.cat} ${e.t==='res'?'RESULTADO':'AÇÃO'}</div><div class="ttt">${e.title}</div><div class="ttd">${e.det}</div></div></div>`});
  h+='</div>';return h;
}

function rEmails(){
  const t={env:0,ab:0,cl:0,clV:0,clM:0,clD:0,bo:0,un:0,ve:0};ems.forEach(e=>{t.env+=e.enviados;t.ab+=e.aberturas;t.cl+=e.cliques;t.clV+=e.cliques_venda;t.clM+=e.cliques_midia;t.clD+=e.cliques_desins;t.bo+=e.bounces;t.un+=e.unsubs;t.ve+=e.vendas});

  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div class="st" style="margin:0">E-mails</div><button class="btn bp bs no-print" onclick="omNewEm()"><span class="i is">add</span> Novo</button></div>`;

  // KPIs
  h+='<div class="kg">';
  [{l:'Enviados',v:t.env,i:'📤',c:'var(--info)'},{l:'Aberturas',v:t.ab,s:P(t.ab,t.env)+'%',i:'👁️',c:'var(--cyan)'},{l:'Cliques',v:t.cl,s:P(t.cl,t.ab)+'%',i:'🖱️',c:'var(--purp)'},{l:'Cl. Venda',v:t.clV,i:'🛒',c:'var(--ok)'},{l:'Cl. Mídia',v:t.clM,i:'🎬',c:'var(--pink)'},{l:'Vendas',v:t.ve,i:'💰',c:'var(--em)'},{l:'Bounces',v:t.bo,s:P(t.bo,t.env)+'%',i:'⚠️',c:'var(--yellow)'},{l:'Descad.',v:t.un,i:'🚫',c:'var(--err)'}].forEach(k=>{h+=`<div class="card kpi" style="border-top-color:${k.c}"><div class="kl">${k.i} ${k.l}</div><div class="kv">${F(k.v)}</div>${k.s?`<div class="ks" style="color:${k.c}">${k.s}</div>`:''}</div>`});
  h+='</div>';

  // DESTAQUES - Melhor e Pior
  if(sent.length>0){
    const bestAb=sent.reduce((b,e)=>(e.enviados>0&&e.aberturas/e.enviados>(b.enviados>0?b.aberturas/b.enviados:0))?e:b);

        h+='</div></div>'}}

  h+=`<div class="kg" style="margin-bottom:16px"><div class="card kpi" style="border-top-color:var(--em)"><div class="kl">🆕 Novas</div><div class="kv">${n}</div></div><div class="card kpi" style="border-top-color:var(--purp)"><div class="kl">⬆️ Upgrades</div><div class="kv">${u}</div></div><div class="card kpi" style="border-top-color:var(--ok)"><div class="kl">💵 Receita</div><div class="kv">R$ ${rc.toFixed(2)}</div></div><div class="card kpi" style="border-top-color:var(--navy)"><div class="kl">📊 Total</div><div class="kv">${ress.length}</div></div></div>`;
  if(!ress.length)return h+`<div class="card emp"><span class="i">monetization_on</span><p style="font-weight:500">Nenhum resultado</p><p style="font-size:12px">Adicione ou importe CSV</p></div>`;
  h+=`<div class="card" style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr style="background:var(--navy);color:#fff"><th style="padding:8px 12px;text-align:left">Data</th><th style="padding:8px 12px">Tipo</th><th style="padding:8px 12px">Plano</th><th style="padding:8px 12px;text-align:right">Valor</th><th style="padding:8px 12px">Origem</th><th style="padding:8px 12px;width:40px" class="no-print"></th></tr></thead><tbody>`;
  ress.forEach(r=>{h+=`<tr style="border-bottom:1px solid var(--g100)"><td style="padding:8px 12px">${r.data}</td><td style="padding:8px 12px"><span class="badge ${r.tipo==='nova_assinatura'?'b-ok':'b-purp'}">${r.tipo==='nova_assinatura'?'Nova':'Upgrade'}</span></td><td style="padding:8px 12px">${r.plano||'—'}</td><td style="padding:8px 12px;text-align:right;font-weight:600;color:var(--em)">R$ ${Number(r.valor_mensal||0).toFixed(2)}</td><td style="padding:8px 12px"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${ORIC[r.origem]||'#666'};margin-right:4px"></span>${ORI[r.origem]||r.origem}</td><td style="padding:8px 12px" class="no-print"><button class="btn bi bd bs" onclick="dRes('${r.id}')"><span class="i is">delete</span></button></td></tr>`});
  h+=`</tbody></table></div>`;return h;
}


// ==================== DASHBOARD GERAL ====================
function rDashboard(){
  const now=new Date();const curMonth=now.toISOString().substring(0,7);
  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">
    <div class="st" style="margin:0">🏠 Dashboard Geral</div>
    <div style="display:flex;gap:8px;align-items:center">
      <label style="margin:0;font-size:12px">Período:</label>
      <input type="month" id="dash-month" value="${curMonth}" onchange="rHome()" style="width:auto;padding:5px 10px;font-size:12px">
    </div></div>`;

  const selMonth=document.getElementById('dash-month')?.value||curMonth;
  const mStart=selMonth+'-01';
  const mEnd=selMonth+'-31';

  // Filter data by month
  const mRes=allRes.filter(r=>r.data>=mStart&&r.data<=mEnd);
  const mOcor=ocors.filter(o=>o.data_inicio>=mStart&&o.data_inicio<=mEnd);
  const mCamps=camps.filter(c=>(c.data_inicio&&c.data_inicio<=mEnd)&&(!c.data_fim||c.data_fim>=mStart));
  const activeCamps=camps.filter(c=>c.status==='ativa');

  const mNovas=mRes.filter(r=>r.tipo==='nova_assinatura').length;
  const mUps=mRes.filter(r=>r.tipo==='upgrade').length;
  const mReceita=mRes.reduce((a,r)=>a+Number(r.valor_mensal||0),0);
  const mNeg=mOcor.filter(o=>o.impacto==='negativo').length;
  const mPos=mOcor.filter(o=>o.impacto==='positivo').length;

  // KPIs
  h+=`<div class="kg">
    <div class="card kpi" style="border-top-color:var(--em)"><div class="kl">🆕 Novas Assinaturas</div><div class="kv">${mNovas}</div><div class="ks" style="color:var(--em)">no período</div></div>
    <div class="card kpi" style="border-top-color:var(--purp)"><div class="kl">⬆️ Upgrades</div><div class="kv">${mUps}</div><div class="ks" style="color:var(--purp)">no período</div></div>
    <div class="card kpi" style="border-top-color:var(--ok)"><div class="kl">💵 Receita Mensal</div><div class="kv">R$ ${mReceita.toFixed(2)}</div></div>
    <div class="card kpi" style="border-top-color:var(--cyan)"><div class="kl">📢 Campanhas Ativas</div><div class="kv">${activeCamps.length}</div></div>
    <div class="card kpi" style="border-top-color:var(--ok)"><div class="kl">🟢 Ocorrências +</div><div class="kv">${mPos}</div></div>
    <div class="card kpi" style="border-top-color:var(--err)"><div class="kl">🔴 Ocorrências -</div><div class="kv">${mNeg}</div></div>
  </div>`;

  // Grid: Campanhas do período + Resultados por origem
  h+=`<div class="g2" style="margin-top:20px">`;

  // Campanhas do período
  h+=`<div class="card" style="padding:20px"><div class="st" style="margin:0 0 12px">📢 Campanhas no Período</div>`;
  if(!mCamps.length)h+=`<p style="font-size:12px;color:var(--g500);text-align:center;padding:16px">Nenhuma campanha neste período</p>`;
  mCamps.forEach(c=>{
    const st={ativa:'b-ok',concluida:'b-info',pausada:'b-warn',rascunho:'b-purp'}[c.status]||'b-info';
    h+=`<div style="padding:10px;border:1px solid var(--g200);border-radius:8px;margin-bottom:8px;cursor:pointer;border-left:3px solid var(--cyan)" onclick="oCamp('${c.id}')">
      <div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:13px;font-weight:600;color:var(--navy)">${c.nome}</span><span class="badge ${st}">${c.status}</span></div>
      ${c.data_inicio?`<div style="font-size:10px;color:var(--g500);margin-top:4px">📅 ${c.data_inicio} → ${c.data_fim||'...'}</div>`:''}
    </div>`;
  });
  h+=`</div>`;

  // Resultados por origem
  h+=`<div class="card" style="padding:20px"><div class="st" style="margin:0 0 12px">📊 Resultados por Origem</div>`;
  if(!mRes.length)h+=`<p style="font-size:12px;color:var(--g500);text-align:center;padding:16px">Nenhum resultado neste período</p>`;
  else{
    const po={};mRes.forEach(r=>{if(!po[r.origem])po[r.origem]={n:0,u:0,r:0};const o=po[r.origem];if(r.tipo==='nova_assinatura')o.n++;else o.u++;o.r+=Number(r.valor_mensal||0)});
    h+=`<canvas id="dash-chart-origem" height="200"></canvas>`;
  }
  h+=`</div></div>`;

  // Grid: Ocorrências recentes + Features
  h+=`<div class="g2" style="margin-top:16px">`;

  // Ocorrências
  h+=`<div class="card" style="padding:20px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div class="st" style="margin:0">📋 Ocorrências no Período</div><button class="btn bp bs" onclick="mainTab=\'ocorrencias\';rHome()">Ver todas</button></div>`;
  if(!mOcor.length)h+=`<p style="font-size:12px;color:var(--g500);text-align:center;padding:16px">Nenhuma ocorrência</p>`;
  mOcor.slice(0,5).forEach(o=>{
    const color=OCOR_COLORS[o.tipo]||'var(--g500)';
    const icon=OCOR_ICONS[o.tipo]||'more_horiz';
    const impEmoji={positivo:'🟢',negativo:'🔴',neutro:'🔵'}[o.impacto]||'🔵';
    h+=`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--g100)">
      <span class="i is" style="color:${color}">${icon}</span>
      <div style="flex:1"><div style="font-size:12px;font-weight:600;color:var(--navy)">${impEmoji} ${o.titulo}</div><div style="font-size:10px;color:var(--g500)">${o.data_inicio}${o.data_fim?' → '+o.data_fim:''}</div></div>
    </div>`;
  });
  h+=`</div>`;

  // Features
  h+=`<div class="card" style="padding:20px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div class="st" style="margin:0">🚀 Features</div><button class="btn bp bs" onclick="mainTab=\'features\';rHome()">Ver todas</button></div>`;
  if(!feats.length)h+=`<p style="font-size:12px;color:var(--g500);text-align:center;padding:16px">Nenhuma feature</p>`;
  feats.slice(0,5).forEach(f=>{
    const st={lancada:'b-ok',em_desenvolvimento:'b-warn',em_teste:'b-info',descontinuada:'b-err'}[f.status]||'b-info';
    const stL={lancada:'Lançada',em_desenvolvimento:'Em dev',em_teste:'Em teste',descontinuada:'Desc.'}[f.status]||f.status;
    h+=`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--g100);cursor:pointer" onclick="oFeat('${f.id}')">
      <span class="i is" style="color:var(--purp)">extension</span>
      <div style="flex:1"><div style="font-size:12px;font-weight:600;color:var(--navy)">${f.nome}</div>${f.data_lancamento?`<div style="font-size:10px;color:var(--g500)">🚀 ${f.data_lancamento}</div>`:''}</div>
      <span class="badge ${st}">${stL}</span>
    </div>`;
  });
  h+=`</div></div>`;

  // Timeline resumida
  h+=`<div class="card" style="padding:20px;margin-top:16px"><div class="st" style="margin:0 0 12px">📅 Linha do Tempo do Período</div>`;
  const tlEvents=[];
  mOcor.forEach(o=>{tlEvents.push({d:o.data_inicio,icon:OCOR_ICONS[o.tipo]||'more_horiz',color:OCOR_COLORS[o.tipo]||'var(--g500)',title:o.titulo,sub:(OCOR_TIPOS[o.tipo]||'Outro')+' · Impacto: '+o.impacto})});
  // Add results grouped by day
  const resByDay={};mRes.forEach(r=>{if(!resByDay[r.data])resByDay[r.data]={n:0,u:0};if(r.tipo==='nova_assinatura')resByDay[r.data].n++;else resByDay[r.data].u++});
  Object.entries(resByDay).forEach(([d,v])=>{tlEvents.push({d,icon:'monetization_on',color:'var(--em)',title:v.n+' nova(s), '+v.u+' upgrade(s)',sub:'Resultado'})});
  tlEvents.sort((a,b)=>a.d.localeCompare(b.d));

  if(!tlEvents.length)h+=`<p style="font-size:12px;color:var(--g500);text-align:center;padding:16px">Nenhum evento no período</p>`;
  else{
    h+=`<div style="position:relative;padding-left:28px">`;
    h+=`<div style="position:absolute;left:9px;top:0;bottom:0;width:2px;background:var(--g200)"></div>`;
    let lastD='';
    tlEvents.forEach(e=>{
      const showD=e.d!==lastD;lastD=e.d;
      h+=`<div style="position:relative;margin-bottom:12px">
        <div style="position:absolute;left:-23px;top:3px;width:12px;height:12px;border-radius:50%;background:${e.color};border:2px solid var(--w);box-shadow:0 0 0 2px ${e.color}"></div>
        ${showD?`<div style="font-size:10px;color:var(--g500);font-weight:600;margin-bottom:3px">${e.d}</div>`:''}
        <div style="background:var(--w);border:1px solid var(--g200);border-radius:6px;padding:8px 12px;border-left:3px solid ${e.color}">
          <div style="font-size:12px;font-weight:600;color:var(--navy)">${e.title}</div>
          <div style="font-size:10px;color:var(--g500)">${e.sub}</div>
        </div></div>`;
    });
    h+=`</div>`;
  }
  h+=`</div>`;

  return h;
}

function renderDashCharts(){
  const selMonth=document.getElementById('dash-month')?.value||(new Date().toISOString().substring(0,7));
  const mStart=selMonth+'-01',mEnd=selMonth+'-31';
  const mRes=allRes.filter(r=>r.data>=mStart&&r.data<=mEnd);
  const po={};mRes.forEach(r=>{po[r.origem]=(po[r.origem]||0)+1});
  const ctx=document.getElementById('dash-chart-origem');
  if(ctx&&Object.keys(po).length){
    new Chart(ctx,{type:'doughnut',data:{labels:Object.keys(po).map(k=>ORI[k]||k),datasets:[{data:Object.values(po),backgroundColor:Object.keys(po).map(k=>ORIC[k]||'#666'),borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{size:11}}}}}});
  }
}

// ==================== OCORRÊNCIAS ====================
function rOcorrencias(){

        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div style="flex:1"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">

            <span style="font-size:14px;font-weight:600;color:var(--navy)">${o.titulo}</span>
            <span class="badge b-purp">${tipo}</span>
            <span class="badge ${impBadge}">Impacto: ${impLabel}</span></div>

function ocorForm(o){

    <div class="g2"><div><label>Tipo</label><select id="mo-tp">${tipos}</select></div><div><label>Impacto</label><select id="mo-imp"><option value="positivo" ${o?.impacto==='positivo'?'selected':''}>Positivo</option><option value="negativo" ${o?.impacto==='negativo'?'selected':''}>Negativo</option><option value="neutro" ${o?.impacto==='neutro'?'selected':''}>Neutro</option></select></div></div>
    <div class="g2"><div><label>Data início</label><input type="date" id="mo-di" value="${o?.data_inicio||''}"></div><div><label>Data fim (opcional)</label><input type="date" id="mo-df" value="${o?.data_fim||''}"></div></div>
    <div><label>Descrição</label><textarea id="mo-ds" placeholder="Detalhes...">${o?.descricao||''}</textarea></div></div>`;
}
function omNewOcor(){om('Nova Ocorrência',ocorForm(),`<button class="btn bo" onclick="cm()">Cancelar</button><button class="btn bp" onclick="svOcor()">Registrar</button>`)}
function omEditOcor(id){om('Editar Ocorrência',ocorForm(ocors.find(o=>o.id===id)),`<button class="btn bo" onclick="cm()">Cancelar</button><button class="btn bp" onclick="upOcor('${id}')">Salvar</button>`)}
async function svOcor(){const d={titulo:$('mo-t').value,tipo:$('mo-tp').value,impacto:$('mo-imp').value,data_inicio:$('mo-di').value,data_fim:$('mo-df').value||null,descricao:$('mo-ds').value};if(!d.titulo||!d.data_inicio){tst('Preencha título e data');return}await db.from('ocorrencias').insert(d);cm();tst('Registrada!');await ldOcors();rHome()}
async function upOcor(id){const d={titulo:$('mo-t').value,tipo:$('mo-tp').value,impacto:$('mo-imp').value,data_inicio:$('mo-di').value,data_fim:$('mo-df').value||null,descricao:$('mo-ds').value};await db.from('ocorrencias').update(d).eq('id',id);cm();tst('Atualizada!');await ldOcors();rHome()}
async function dOcor(id){if(!confirm('Excluir?'))return;await db.from('ocorrencias').delete().eq('id',id);tst('Excluída');await ldOcors();rHome()}

// CSV
function omCSV(){om('Importar CSV',`<div style="margin-bottom:16px"><p style="font-size:13px;color:var(--g700);margin-bottom:8px">Formato do CSV:</p><div class="card" style="padding:12px;font-family:monospace;font-size:11px;background:var(--bg)">data,tipo,plano,valor_mensal,origem<br>2026-03-19,nova_assinatura,PRO,99.90,email_campanha</div><p style="font-size:10px;color:var(--g500);margin-top:8px">Origens: email_campanha, whatsapp, rede_social, indicacao, comercial, google, outro</p></div><div class="ua" id="csv-drop" onclick="document.getElementById('csv-f').click()" ondragover="event.preventDefault();this.classList.add('drag')" ondragleave="this.classList.remove('drag')" ondrop="event.preventDefault();this.classList.remove('drag');hCSV(event.dataTransfer.files[0])"><span class="i il" style="color:var(--g300);display:block;margin-bottom:8px">upload_file</span><p style="font-size:14px;font-weight:500;color:var(--g700)">Arraste ou clique</p><input type="file" id="csv-f" accept=".csv,.txt" onchange="hCSV(this.files[0])"></div><div id="csv-pv" style="margin-top:16px"></div>`,`<button class="btn bo" onclick="cm()">Cancelar</button><button class="btn bp" id="csv-ok" onclick="cCSV()" disabled>Importar</button>`)}
let csvR=[];
function hCSV(f){if(!f)return;const r=new FileReader();r.onload=function(e){const ls=e.target.result.split('\n').map(l=>l.trim()).filter(l=>l);if(ls.length<2){tst('CSV vazio');return}const hd=ls[0].toLowerCase().split(/[,;\t]/);const iD=hd.findIndex(h=>h.includes('data')),iT=hd.findIndex(h=>h.includes('tipo')),iP=hd.findIndex(h=>h.includes('plano')),iV=hd.findIndex(h=>h.includes('valor')),iO=hd.findIndex(h=>h.includes('origem'));if(iD<0||iT<0){tst('Precisa de "data" e "tipo"');return}csvR=[];for(let i=1;i<ls.length;i++){const c=ls[i].split(/[,;\t]/);if(c.length<2)continue;csvR.push({data:c[iD]?.trim(),tipo:c[iT]?.trim(),plano:iP>=0?c[iP]?.trim():'',valor_mensal:iV>=0?parseFloat(c[iV])||0:0,origem:iO>=0?c[iO]?.trim():'outro'})}$('csv-pv').innerHTML=`<div class="card" style="padding:12px"><p style="font-size:13px;font-weight:600;color:var(--navy);margin-bottom:8px">✅ ${csvR.length} registro(s)</p></div>`;$('csv-ok').disabled=false};r.readAsText(f)}
async function cCSV(){if(!csvR.length)return;const rows=csvR.map(r=>({...r,campanha_id:cCamp.id}));const{error}=await db.from('resultados_campanha').insert(rows);if(error){tst('Erro: '+error.message);return}cm();tst(`${rows.length} importado(s)!`);csvR=[];await ldCampD(cCamp.id);rCamp()}

async function dFeat(id){if(!confirm('Excluir feature?'))return;await db.from('features').delete().eq('id',id);tst('Excluída');await ldFeats();rHome()}

// Link campaign to feature
function omLinkCamp(){const opts=camps.filter(c=>!fLinks.find(l=>l.campanha_id===c.id)).map(c=>`<option value="${c.id}">${c.nome}</option>`).join('');if(!opts){tst('Todas campanhas já vinculadas');return}om('Vincular Campanha',`<div><label>Campanha</label><select id="ml-c">${opts}</select></div>`,`<button class="btn bo" onclick="cm()">Cancelar</button><button class="btn bp" onclick="svLink()">Vincular</button>`)}
async function svLink(){await db.from('feature_campanhas').insert({feature_id:cFeat.id,campanha_id:$('ml-c').value});cm();tst('Vinculada!');await ldFeatD(cFeat.id);rFeat()}
async function dFLink(id){if(!confirm('Desvincular?'))return;await db.from('feature_campanhas').delete().eq('id',id);tst('Desvinculada');await ldFeatD(cFeat.id);rFeat()}

// Feedback modals
function omNewFb(){om('Novo Feedback',`<div style="display:flex;flex-direction:column;gap:10px"><div class="g2"><div><label>Data</label><input type="date" id="mfb-d"></div><div><label>Tipo</label><select id="mfb-t"><option value="feedback_positivo">Positivo</option><option value="feedback_negativo">Negativo</option><option value="bug">Bug</option><option value="duvida">Dúvida</option><option value="sugestao">Sugestão</option></select></div></div><div><label>Descrição</label><textarea id="mfb-ds"></textarea></div><div><label>Origem</label><select id="mfb-o"><option value="suporte">Suporte</option><option value="whatsapp">WhatsApp</option><option value="email">E-mail</option><option value="rede_social">Rede Social</option><option value="interno">Interno</option></select></div></div>`,`<button class="btn bo" onclick="cm()">Cancelar</button><button class="btn bp" onclick="svFb()">Salvar</button>`)}
async function svFb(){const d={feature_id:cFeat.id,data:$('mfb-d').value,tipo:$('mfb-t').value,descricao:$('mfb-ds').value,origem:$('mfb-o').value};if(!d.data||!d.descricao){tst('Preencha data e descrição');return}await db.from('feature_feedbacks').insert(d);cm();tst('Salvo!');await ldFeatD(cFeat.id);rFeat()}
async function toggleFb(id,v){await db.from('feature_feedbacks').update({resolvido:v}).eq('id',id);tst(v?'Resolvido!':'Reaberto');await ldFeatD(cFeat.id);rFeat()}
async function dFb(id){if(!confirm('Excluir?'))return;await db.from('feature_feedbacks').delete().eq('id',id);tst('Excluído');await ldFeatD(cFeat.id);rFeat()}

// INIT
async function init(){await Promise.all([ldCamps(),ldFeats(),ldOcors(),ldAllRes()]);rHome()}
init();
</script>
