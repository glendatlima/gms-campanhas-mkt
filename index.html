<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GMS — Marketing Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</body>
</html>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#10293F;--navy2:#1a3d5c;--cyan:#45E5E5;--cyan2:#2ecece;--cl:#E8F9F9;--yellow:#FFB800;--w:#FFF;--bg:#F8FAFC;--g100:#F5F5F5;--g200:#E5E5E5;--g300:#CCC;--g500:#666;--g700:#444;--g900:#333;--err:#DC2626;--errbg:#FEF2F2;--ok:#16A34A;--okbg:#F0FDF4;--info:#2563EB;--infobg:#EFF6FF;--purp:#7C3AED;--orange:#EA580C;--pink:#DB2777;--em:#059669;--sh:0 1px 3px rgba(16,41,63,.08);--shl:0 4px 12px rgba(16,41,63,.12)}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--g900);min-height:100vh}
.icon{font-family:'Material Symbols Rounded';font-size:20px;font-style:normal;line-height:1;user-select:none;vertical-align:middle}.icon-sm{font-size:16px}.icon-lg{font-size:24px}
.top{height:56px;background:var(--navy);display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(16,41,63,.2)}
.tm{background:var(--cyan);color:var(--navy);font-weight:700;font-size:14px;padding:4px 8px;border-radius:5px}.tt{color:#fff;font-size:14px;opacity:.9;font-weight:500}
.tb{flex:1;font-size:13px;color:rgba(255,255,255,.55);display:flex;align-items:center;gap:4px}.tb .a{color:#fff;font-weight:500}.tb span[onclick]{cursor:pointer}.tb span[onclick]:hover{color:var(--cyan)}
.ct{max-width:1200px;margin:0 auto;padding:24px 20px}
.card{background:var(--w);border-radius:10px;box-shadow:var(--sh);border:1px solid var(--g200);transition:all .2s}.card:hover{box-shadow:var(--shl)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:7px;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:all .15s;font-family:inherit}
.bp{background:var(--cyan);color:var(--navy)}.bp:hover{background:var(--cyan2)}.bo{background:transparent;border:1px solid var(--g300);color:var(--g700)}.bo:hover{border-color:var(--cyan);color:var(--navy)}.bd{background:transparent;border:1px solid var(--err);color:var(--err)}.bd:hover{background:var(--errbg)}.bs{padding:5px 12px;font-size:11px}.bi{padding:6px;min-width:32px;min-height:32px;justify-content:center}
input,select,textarea{width:100%;padding:8px 12px;border-radius:7px;border:1px solid var(--g300);font-size:13px;font-family:inherit;outline:none;transition:border .15s}input:focus,select:focus,textarea:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(69,229,229,.15)}select{cursor:pointer}textarea{resize:vertical;min-height:60px}label{font-size:11px;color:var(--g500);font-weight:500;margin-bottom:3px;display:block}
.badge{display:inline-flex;padding:3px 10px;border-radius:9999px;font-size:10px;font-weight:600}.b-ok{background:var(--okbg);color:var(--ok);border:1px solid rgba(22,163,74,.3)}.b-warn{background:#FFFBEB;color:#92400E;border:1px solid rgba(255,184,0,.5)}.b-err{background:var(--errbg);color:var(--err);border:1px solid rgba(220,38,38,.3)}.b-info{background:var(--infobg);color:var(--info);border:1px solid rgba(37,99,235,.3)}.b-purp{background:#F5F3FF;color:var(--purp);border:1px solid rgba(124,58,237,.3)}
.tabs{display:flex;gap:0;border-bottom:2px solid var(--g200);margin:20px 0;flex-wrap:wrap}.tab{padding:10px 16px;font-size:13px;font-weight:400;color:var(--g500);background:0;border:0;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;font-family:inherit;transition:all .15s;white-space:nowrap}.tab.active{color:var(--navy);font-weight:600;border-bottom-color:var(--cyan)}.tab:hover{color:var(--navy)}
.kg{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px}.kpi{padding:14px 16px;border-top:3px solid var(--navy)}.kl{font-size:10px;color:var(--g500);margin-bottom:4px;font-weight:500}.kv{font-size:22px;font-weight:700;color:var(--navy);line-height:1}.ks{font-size:10px;font-weight:600;margin-top:3px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}@media(max-width:768px){.g2,.g3{grid-template-columns:1fr}}
.st{font-size:14px;font-weight:600;color:var(--navy);margin-bottom:14px;font-family:'Poppins',sans-serif}.sd{font-size:11px;color:var(--g500);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin:14px 0 8px;padding:8px 0;border-bottom:1px dashed var(--g200)}
.mc{text-align:center;padding:6px 4px;border-radius:6px;background:var(--bg)}.ml{font-size:9px;color:var(--g500);margin-bottom:2px}.mv{font-size:16px;font-weight:700}.ms{font-size:9px;font-weight:600}
.li{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;background:var(--bg);border:1px solid var(--g200)}.ld{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ec{border-left:4px solid var(--ok);overflow:hidden;margin-bottom:12px}.ec.pend{border-left-color:var(--yellow)}
.cc{padding:20px;cursor:pointer;border-left:4px solid var(--cyan);transition:all .2s}.cc:hover{transform:translateY(-2px);box-shadow:var(--shl)}
.fc{padding:20px;cursor:pointer;border-left:4px solid var(--purp);transition:all .2s}.fc:hover{transform:translateY(-2px)}
.emp{padding:40px;text-align:center;color:var(--g500)}.emp .icon{font-size:48px;color:var(--g300);display:block;margin-bottom:12px}
.mo{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(16,41,63,.5);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}.mo.open{opacity:1;pointer-events:all}
.md{background:var(--w);border-radius:14px;width:90%;max-width:620px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(16,41,63,.3);transform:scale(.95);transition:transform .2s}.mo.open .md{transform:scale(1)}
.mh{padding:16px 20px;border-bottom:1px solid var(--g200);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--w);z-index:1;border-radius:14px 14px 0 0}.mh h2{font-size:16px;font-weight:600;color:var(--navy);font-family:'Poppins',sans-serif}
.mb{padding:20px}.mf{padding:12px 20px;border-top:1px solid var(--g200);display:flex;gap:8px;justify-content:flex-end}
.toast{position:fixed;bottom:20px;right:20px;background:var(--navy);color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(16,41,63,.15);opacity:0;transition:opacity .3s;pointer-events:none;z-index:300;display:flex;align-items:center;gap:8px}.toast.show{opacity:1}
.ld2{display:flex;align-items:center;justify-content:center;padding:60px}.sp{width:36px;height:36px;border:3px solid var(--g200);border-top-color:var(--cyan);border-radius:50%;animation:spin .7s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
.tw{position:relative;padding-left:30px}.tw::before{content:'';position:absolute;left:11px;top:0;bottom:0;width:2px;background:var(--g200)}.ti{position:relative;margin-bottom:16px}.tdot{position:absolute;left:-25px;top:4px;width:14px;height:14px;border-radius:50%;border:2px solid var(--w);box-shadow:0 0 0 2px var(--g300)}.tdt{font-size:10px;color:var(--g500);font-weight:600;margin-bottom:4px}.tc{background:var(--w);border:1px solid var(--g200);border-radius:8px;padding:12px;box-shadow:var(--sh)}.tc.act{border-left:3px solid var(--cyan)}.tc.res{border-left:3px solid var(--em)}.ttg{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}.ttt{font-size:13px;font-weight:600;color:var(--navy)}.ttd{font-size:11px;color:var(--g500);margin-top:2px}
.ua{border:2px dashed var(--g300);border-radius:8px;padding:30px;text-align:center;cursor:pointer;transition:all .2s}.ua:hover,.ua.drag{border-color:var(--cyan);background:var(--cl)}.ua input{display:none}
.feat-hero{background:linear-gradient(135deg,#10293F,#1a3d5c);border-radius:12px;padding:24px;color:#fff;margin-bottom:20px}
.ft{margin-top:32px;padding-top:16px;border-top:1px solid var(--g200);text-align:center}.ft p{font-size:10px;color:var(--g500)}
.nav{display:flex;gap:4px;padding:20px 0 0;margin-bottom:0}
.nav-btn{padding:10px 20px;font-size:13px;font-weight:500;color:var(--g500);background:var(--w);border:1px solid var(--g200);border-bottom:none;border-radius:8px 8px 0 0;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:6px}
.nav-btn.active{color:var(--navy);font-weight:600;background:var(--w);border-color:var(--g200);box-shadow:0 -2px 8px rgba(16,41,63,.06);position:relative}
.nav-btn.active::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:var(--w)}
.nav-btn:hover{color:var(--navy)}
.nav-panel{background:var(--w);border:1px solid var(--g200);border-radius:0 8px 8px 8px;padding:24px;box-shadow:var(--sh);min-height:200px}
@media print{.top,.nav,.btn,.no-print{display:none!important}body{background:#fff}}
</style>
</head>
<body>
<header class="top">
<div style="display:flex;align-items:center;gap:10px"><span class="tm">GMS</span><span class="tt">Marketing Intelligence</span></div>
<nav class="tb" id="bc"><span class="a">Painel de Marketing</span></nav>
</header>
<div class="ct" id="app"><div class="ld2"><div class="sp"></div></div></div>
<div class="mo" id="mo" onclick="if(event.target===this)cm()"><div class="md"><div class="mh"><h2 id="mt"></h2><button class="btn bi bo" onclick="cm()"><span class="icon icon-sm">close</span></button></div><div class="mb" id="mmb"></div><div class="mf" id="mmf"></div></div></div>
<div class="toast" id="tst"></div>
<script>

const SB_URL='https://rziulhxiwgjcizieqcae.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ6aXVsaHhpd2dqY2l6aWVxY2FlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MDM5OTksImV4cCI6MjA5MDQ3OTk5OX0.UeOfPqM6Gn1zTsnV6WmsNO8uCtdnjux3gEqwUrM2DBM';
const db=supabase.createClient(SB_URL,SB_KEY);
let vw='home',mainTab='dashboard',cCamp=null,cTab='timeline',cFeat=null,fTab='overview';
let camps=[],ems=[],wps=[],socs=[],ress=[],feats=[],fLinks=[],fFbs=[],ocors=[],allRes=[],allEms=[],allSocs=[],allVendas=[];
const $=id=>document.getElementById(id);
const P=(n,d)=>d>0?(n/d*100).toFixed(1):'0.0';
const F=n=>(n||0).toLocaleString('pt-BR');
const ORI={email_campanha:'E-mail',whatsapp:'WhatsApp',rede_social:'Rede Social',indicacao:'Indicação',comercial:'Comercial',google:'Google',outro:'Outro'};
const OCOR_TIPOS={promocao:'Promoção/Oferta',ausencia:'Ausência/Férias',problema_tecnico:'Problema Técnico',evento_externo:'Evento Externo',mudanca_preco:'Mudança de Preço',concorrente:'Concorrente',leads:'Leads',mudanca_time:'Mudança no Time',outro:'Outro'};
const OCOR_ICONS={promocao:'sell',ausencia:'person_off',problema_tecnico:'error',evento_externo:'event',mudanca_preco:'price_change',concorrente:'groups',leads:'trending_up',mudanca_time:'swap_horiz',outro:'more_horiz'};
const OCOR_COLORS={promocao:'#45E5E5',ausencia:'#EA580C',problema_tecnico:'#DC2626',evento_externo:'#2563EB',mudanca_preco:'#FFB800',concorrente:'#DB2777',leads:'#7C3AED',mudanca_time:'#10293F',outro:'#666'};
const IMP_B={positivo:'b-ok',negativo:'b-err',neutro:'b-info'};
const ORIC={email_campanha:'#2563EB',whatsapp:'#16A34A',rede_social:'#DB2777',indicacao:'#7C3AED',comercial:'#EA580C',google:'#45E5E5',outro:'#666'};
function tst(m){const t=$('tst');t.innerHTML='<span class="icon icon-sm">check_circle</span>'+m;t.classList.add('show');clearTimeout(window._t);window._t=setTimeout(()=>t.classList.remove('show'),2500)}
function om(t,b,f){$('mt').textContent=t;$('mmb').innerHTML=b;$('mmf').innerHTML=f;$('mo').classList.add('open')}
function cm(){$('mo').classList.remove('open')}
function sbc(p){$('bc').innerHTML=p.map((x,i)=>i<p.length-1?`<span onclick="${x.a||''}">${x.l}</span><span style="opacity:.4">›</span>`:`<span class="a">${x.l}</span>`).join('')}

// DATA
async function ldCamps(){const{data}=await db.from('campanhas').select('*').order('created_at',{ascending:false});camps=data||[]}
async function ldVendas(){const{data}=await db.from('vendas').select('*').order('data_contrato',{ascending:false});allVendas=data||[]}
async function ldAllEms(){const{data}=await db.from('emails_campanha').select('*').order('data_envio');allEms=data||[]}
async function ldAllSocs(){const{data}=await db.from('social_campanha').select('*').order('data_publicacao',{ascending:false});allSocs=data||[]}
async function ldOcors(){const{data}=await db.from('ocorrencias').select('*').order('data_inicio',{ascending:false});ocors=data||[]}
async function ldAllRes(){const{data}=await db.from('resultados_campanha').select('*').order('data',{ascending:false});allRes=data||[]}
async function ldFeats(){const{data}=await db.from('features').select('*').order('created_at',{ascending:false});feats=data||[]}
async function ldCampD(id){const[e,w,s,r]=await Promise.all([db.from('emails_campanha').select('*').eq('campanha_id',id).order('ordem'),db.from('whatsapp_campanha').select('*').eq('campanha_id',id).order('created_at'),db.from('social_campanha').select('*').eq('campanha_id',id).order('data_publicacao',{ascending:false}),db.from('resultados_campanha').select('*').eq('campanha_id',id).order('data')]);ems=e.data||[];wps=w.data||[];socs=s.data||[];ress=r.data||[]}
async function ldFeatD(id){const[l,f]=await Promise.all([db.from('feature_campanhas').select('*,campanhas(*)').eq('feature_id',id),db.from('feature_feedbacks').select('*').eq('feature_id',id).order('data',{ascending:false})]);fLinks=l.data||[];fFbs=f.data||[]}

// HOME
function rHome(){
  vw='home';cCamp=null;cFeat=null;sbc([{l:'Painel de Marketing'}]);
  let h='<div style="margin-bottom:20px"><h1 style="font-size:24px;font-weight:700;color:var(--navy);font-family:Poppins,sans-serif;margin:0">📊 Marketing Intelligence</h1><p style="font-size:13px;color:var(--g500);margin-top:4px">Gerencie campanhas, features e resultados</p></div>';
  h+=`<div class="nav"><button class="nav-btn ${mainTab==='dashboard'?'active':''}" onclick="mainTab='dashboard';rHome()"><span class="icon icon-sm">dashboard</span> Dashboard</button><button class="nav-btn ${mainTab==='campanhas'?'active':''}" onclick="mainTab='campanhas';rHome()"><span class="icon icon-sm">campaign</span> Campanhas (${camps.length})</button><button class="nav-btn ${mainTab==='features'?'active':''}" onclick="mainTab='features';rHome()"><span class="icon icon-sm">extension</span> Features (${feats.length})</button><button class="nav-btn ${mainTab==='comparativo'?'active':''}" onclick="mainTab='comparativo';rHome()"><span class="icon icon-sm">compare_arrows</span> Comparativo</button><button class="nav-btn ${mainTab==='vendas'?'active':''}" onclick="mainTab='vendas';rHome()"><span class="icon icon-sm">monetization_on</span> Vendas (${allVendas.length})</button><button class="nav-btn ${mainTab==='ocorrencias'?'active':''}" onclick="mainTab='ocorrencias';rHome()"><span class="icon icon-sm">event_note</span> Ocorrências (${ocors.length})</button></div><div class="nav-panel">`;
  if(mainTab==='dashboard')h+=pgDash();
  else if(mainTab==='campanhas')h+=rCampList();
  else if(mainTab==='features')h+=rFeatList();
  else if(mainTab==='comparativo')h+=pgComp();
  else if(mainTab==='vendas')h+=pgVendas();
  else if(mainTab==='ocorrencias')h+=pgOcor();
  h+='</div><div class="ft"><p>© 2026 Sismais Tecnologia · GMS</p></div>';
  $('app').innerHTML=h;
  if(mainTab==='vendas')setTimeout(chVendas,100);
  if(mainTab==='dashboard')setTimeout(chDash,100);
}

// CAMPAIGNS LIST
function rCampList(){
  let h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><div class="st" style="margin:0">Campanhas de Marketing</div><button class="btn bp" onclick="omNewCamp()"><span class="icon icon-sm">add</span> Nova Campanha</button></div>';
  if(!camps.length)return h+'<div class="card emp"><span class="icon">campaign</span><p style="font-size:14px;font-weight:500">Nenhuma campanha</p></div>';
  camps.forEach(c=>{
    const st={ativa:'b-ok',concluida:'b-info',pausada:'b-warn',rascunho:'b-purp'}[c.status]||'b-info';
    h+=`<div class="card cc" onclick="oCamp('${c.id}')" style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div style="font-size:16px;font-weight:600;color:var(--navy);font-family:Poppins,sans-serif">${c.nome}</div>${c.descricao?`<div style="font-size:12px;color:var(--g500);margin-top:4px">${c.descricao}</div>`:''}<div style="display:flex;gap:12px;margin-top:10px;font-size:11px;color:var(--g700);align-items:center">${c.data_inicio?`<span>📅 ${c.data_inicio} → ${c.data_fim||'...'}</span>`:''}<span class="badge ${st}">${c.status}</span></div></div><div style="display:flex;gap:4px" onclick="event.stopPropagation()"><button class="btn bi bo bs" onclick="omEditCamp('${c.id}')"><span class="icon icon-sm">edit</span></button><button class="btn bi bd bs" onclick="dCamp('${c.id}')"><span class="icon icon-sm">delete</span></button></div></div></div>`;
  });
  return h;
}

// FEATURES LIST
function rFeatList(){
  let h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><div class="st" style="margin:0">Features do GMS</div><button class="btn bp" onclick="omNewFeat()"><span class="icon icon-sm">add</span> Nova Feature</button></div>';
  if(!feats.length)return h+'<div class="card emp"><span class="icon">extension</span><p>Nenhuma feature</p></div>';
  feats.forEach(f=>{
    const st={lancada:'b-ok',em_desenvolvimento:'b-warn',em_teste:'b-info',descontinuada:'b-err'}[f.status]||'b-info';
    const stL={lancada:'Lançada',em_desenvolvimento:'Em dev',em_teste:'Em teste',descontinuada:'Desc.'}[f.status]||f.status;
    h+=`<div class="card fc" onclick="oFeat('${f.id}')" style="margin-bottom:12px"><div style="display:flex;justify-content:space-between"><div><div style="font-size:16px;font-weight:600;color:var(--navy);font-family:Poppins,sans-serif">${f.nome}</div>${f.descricao?`<div style="font-size:12px;color:var(--g500);margin-top:4px">${f.descricao}</div>`:''}<div style="display:flex;gap:12px;margin-top:10px;font-size:11px;color:var(--g700);align-items:center">${f.data_lancamento?`<span>🚀 ${f.data_lancamento}</span>`:''}<span class="badge ${st}">${stL}</span></div></div><div style="display:flex;gap:4px" onclick="event.stopPropagation()"><button class="btn bi bo bs" onclick="omEditFeat('${f.id}')"><span class="icon icon-sm">edit</span></button><button class="btn bi bd bs" onclick="dFeat('${f.id}')"><span class="icon icon-sm">delete</span></button></div></div></div>`;
  });
  return h;
}

// CAMPAIGN DETAIL
async function oCamp(id){$('app').innerHTML='<div class="ld2"><div class="sp"></div></div>';cCamp=camps.find(c=>c.id===id);await ldCampD(id);vw='camp';cTab='emails';rCamp()}
function rCamp(){
  const c=cCamp;sbc([{l:'Painel',a:"goHome()"},{l:c.nome}]);
  let h=`<div style="margin-bottom:8px"><button class="btn bo bs no-print" onclick="goHome()" style="margin-bottom:8px"><span class="icon icon-sm">arrow_back</span> Voltar</button>
    <div style="display:flex;justify-content:space-between;align-items:center"><h1 style="font-size:20px;font-weight:700;color:var(--navy);font-family:Poppins,sans-serif;margin:0">${c.nome}</h1>
    <button class="btn bo bs no-print" onclick="window.print()"><span class="icon icon-sm">picture_as_pdf</span> Exportar PDF</button></div>
    ${c.descricao?`<p style="font-size:12px;color:var(--g500);margin-top:4px">${c.descricao}</p>`:''}</div>`;
  h+=`<div class="tabs no-print">
    <button class="tab ${cTab==='emails'?'active':''}" onclick="sT('emails')">📧 E-mails (${ems.length})</button>
    <button class="tab ${cTab==='whatsapp'?'active':''}" onclick="sT('whatsapp')">📱 WhatsApp (${wps.length})</button>
    <button class="tab ${cTab==='social'?'active':''}" onclick="sT('social')">📸 Social (${socs.length})</button></div>`;
  if(cTab==='emails')h+=rEmails();
  else if(cTab==='whatsapp')h+=rWap();
  else if(cTab==='social')h+=rSoc();

let csvR=[];
function omCSV(){om('Importar CSV',`<div style="margin-bottom:16px"><p style="font-size:13px;color:var(--g700);margin-bottom:8px">Formato:</p><div class="card" style="padding:12px;font-family:monospace;font-size:11px;background:var(--bg)">data,tipo,plano,valor_mensal,origem<br>2026-03-19,nova_assinatura,PRO,99.90,email_campanha</div><p style="font-size:10px;color:var(--g500);margin-top:8px">Origens: email_campanha, whatsapp, rede_social, indicacao, comercial, google, outro</p></div><div class="ua" onclick="document.getElementById('csv-f').click()"><span class="icon icon-lg" style="color:var(--g300);display:block;margin-bottom:8px">upload_file</span><p style="font-size:14px;font-weight:500;color:var(--g700)">Arraste ou clique</p><input type="file" id="csv-f" accept=".csv,.txt" onchange="hCSV(this.files[0])"></div><div id="csv-pv" style="margin-top:16px"></div>`,`<button class="btn bo" onclick="cm()">Cancelar</button><button class="btn bp" id="csv-ok" onclick="cCSV()" disabled>Importar</button>`)}
function hCSV(f){if(!f)return;const r=new FileReader();r.onload=function(e){const ls=e.target.result.split('\n').map(l=>l.trim()).filter(l=>l);if(ls.length<2){tst('CSV vazio');return}const hd=ls[0].toLowerCase().split(/[,;\t]/);const iD=hd.findIndex(h=>h.includes('data')),iT=hd.findIndex(h=>h.includes('tipo')),iP=hd.findIndex(h=>h.includes('plano')),iV=hd.findIndex(h=>h.includes('valor')),iO=hd.findIndex(h=>h.includes('origem'));if(iD<0||iT<0){tst('Precisa de "data" e "tipo"');return}csvR=[];for(let i=1;i<ls.length;i++){const c=ls[i].split(/[,;\t]/);if(c.length<2)continue;csvR.push({data:c[iD]?.trim(),tipo:c[iT]?.trim(),plano:iP>=0?c[iP]?.trim():'',valor_mensal:iV>=0?parseFloat(c[iV])||0:0,origem:iO>=0?c[iO]?.trim():'outro'})}$('csv-pv').innerHTML=`<div class="card" style="padding:12px"><p style="font-size:13px;font-weight:600;color:var(--navy)">✅ ${csvR.length} registro(s)</p></div>`;$('csv-ok').disabled=false};r.readAsText(f)}
async function cCSV(){if(!csvR.length)return;const rows=csvR.map(r=>({...r,campanha_id:cCamp.id}));const{error}=await db.from('resultados_campanha').insert(rows);if(error){tst('Erro: '+error.message);return}cm();tst(`${rows.length} importado(s)!`);csvR=[];await ldCampD(cCamp.id);rCamp()}

  h+='</tbody></table></div>';

    h+='<div class="card" style="overflow-x:auto;padding:16px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div class="st" style="margin:0">Todas as Vendas ('+allVendas.length+')</div></div><table style="width:100%;border-collapse:collapse;font-size:11px"><thead><tr style="background:var(--g100)"><th style="padding:6px 10px;text-align:left">Data</th><th style="padding:6px 10px;text-align:left">Cliente</th><th style="padding:6px 10px">Plano</th><th style="padding:6px 10px;text-align:right">Valor</th><th style="padding:6px 10px">Tipo Venda</th><th style="padding:6px 10px">Origem</th><th style="padding:6px 10px">Vendedor</th><th style="padding:6px 10px">Status</th></tr></thead><tbody>';

function chVendas(){
  var po={};allVendas.forEach(function(v){var o=v.origem||'Não identificado';po[o]=(po[o]||0)+1});
  var colors=['#2563EB','#16A34A','#DB2777','#7C3AED','#EA580C','#45E5E5','#FFB800','#666','#10293F','#DC2626'];

// Upload planilha vendas
function omUploadVendas(){om('Importar Planilha de Vendas','<p style="font-size:13px;color:var(--g700);margin-bottom:12px">Suba o CSV no mesmo formato da planilha de Leads/Negócios Ganhos.</p><div class="ua" onclick="document.getElementById(\'vf\').click()"><span class="icon icon-lg" style="color:var(--g300);display:block;margin-bottom:8px">upload_file</span><p style="font-size:14px;font-weight:500;color:var(--g700)">Arraste ou clique</p><input type="file" id="vf" accept=".csv,.txt" onchange="hUploadV(this.files[0])"></div><div id="v-pv" style="margin-top:16px"></div>','<button class="btn bo" onclick="cm()">Cancelar</button><button class="btn bp" id="v-ok" onclick="cUploadV()" disabled>Importar</button>')}
var csvVendas=[];
function hUploadV(f){if(!f)return;var r=new FileReader();r.onload=function(e){
  var ls=e.target.result.split('\n').map(function(l){return l.trim()}).filter(function(l){return l});
  if(ls.length<2){tst('Arquivo vazio');return}
  var hd=ls[0].split(',');
  var iData=hd.findIndex(function(x){return x.includes('Data Contrato')});
  var iPlat=hd.findIndex(function(x){return x.includes('Plataforma')});
  var iNum=hd.findIndex(function(x){return x.includes('Contrato')&&x.includes('N')});
  var iCli=hd.findIndex(function(x){return x.includes('Cliente')});
  var iEmail=hd.findIndex(function(x){return x.includes('Email')});
  var iTel=hd.findIndex(function(x){return x.includes('telefone')});
  var iPlano=hd.findIndex(function(x){return x.includes('Plano')});
  var iDoc=hd.findIndex(function(x){return x.includes('Docto')});
  var iInt=hd.findIndex(function(x){return x.includes('intervalo')});
  var iPag=hd.findIndex(function(x){return x.includes('Forma Pag')});
  var iVal=hd.findIndex(function(x){return x.includes('Valor Assinatura')});
  var iMRR=hd.findIndex(function(x){return x.includes('MRR')});
  var iTipo=hd.findIndex(function(x){return x.includes('Tipo de Venda')});
  var iOrig=hd.findIndex(function(x){return x.includes('Origem')});
  var iVend=hd.findIndex(function(x){return x.includes('Vendedor')});
  var iAdes=hd.findIndex(function(x){return x.includes('Ades')});
  var iAnot=hd.findIndex(function(x){return x.includes('Anota')});
  var iSeg=hd.findIndex(function(x){return x.includes('Segmento')});
  var iMes=hd.findIndex(function(x){return x.includes('Mes')});
  var iStat=hd.findIndex(function(x){return x.includes('Status')});
  var iQtd=hd.findIndex(function(x){return x.includes('Qtd')});
  var iChurn=hd.findIndex(function(x){return x.includes('Churn')});
  if(iData<0){tst('Coluna "Data Contrato" não encontrada');return}
  csvVendas=[];
  for(var i=1;i<ls.length;i++){
    // Parse CSV respeitando aspas
    var cols=[];var cur='';var inQ=false;
    for(var j=0;j<ls[i].length;j++){var ch=ls[i][j];if(ch==='"'){inQ=!inQ}else if(ch===','&&!inQ){cols.push(cur.trim());cur=''}else{cur+=ch}}
    cols.push(cur.trim());
    if(cols.length<3)continue;
    var dataRaw=cols[iData]||'';
    // Converter dd/mm/yyyy para yyyy-mm-dd
    var dp=dataRaw.split('/');
    var dataISO=dp.length===3?(dp[2]+'-'+dp[1].padStart(2,'0')+'-'+dp[0].padStart(2,'0')):dataRaw;
    if(!dataISO||dataISO.length<10)continue;
    var parseVal=function(s){if(!s)return 0;return parseFloat(s.replace('R$','').replace('.','').replace(',','.').trim())||0};
    csvVendas.push({
      data_contrato:dataISO,
      plataforma:iPlat>=0?cols[iPlat]:'',
      num_contrato:iNum>=0?cols[iNum]:'',
      cliente:iCli>=0?cols[iCli]:'',
      email:iEmail>=0?cols[iEmail]:'',
      telefone:iTel>=0?cols[iTel]:'',
      plano:iPlano>=0?cols[iPlano]:'',
      documento:iDoc>=0?cols[iDoc]:'',
      tipo_intervalo:iInt>=0?cols[iInt]:'month',
      forma_pagamento:iPag>=0?cols[iPag]:'',
      valor_assinatura:iVal>=0?parseVal(cols[iVal]):0,
      valor_mrr:iMRR>=0?parseVal(cols[iMRR]):0,
      tipo_venda:iTipo>=0?cols[iTipo]:'',
      origem:iOrig>=0?cols[iOrig]:'',
      vendedor:iVend>=0?cols[iVend]:'',
      valor_adesao:iAdes>=0?parseVal(cols[iAdes]):0,
      anotacoes:iAnot>=0?cols[iAnot]:'',
      segmento:iSeg>=0?cols[iSeg]:'',
      mes_ano:iMes>=0?cols[iMes]:'',
      status_contrato:iStat>=0?cols[iStat]:'active',
      qtd_cobranca:iQtd>=0?parseInt(cols[iQtd])||0:0,
      churn_data:iChurn>=0&&cols[iChurn]?(function(){var d2=cols[iChurn].split('/');return d2.length===3?(d2[2]+'-'+d2[1].padStart(2,'0')+'-'+d2[0].padStart(2,'0')):null})():null
    });
  }
  document.getElementById('v-pv').innerHTML='<div class="card" style="padding:12px"><p style="font-weight:600;color:var(--navy)">✅ '+csvVendas.length+' venda(s) encontradas</p><p style="font-size:11px;color:var(--g500);margin-top:4px">Período: '+csvVendas[0]?.data_contrato+' a '+csvVendas[csvVendas.length-1]?.data_contrato+'</p></div>';
  document.getElementById('v-ok').disabled=false;
};r.readAsText(f,'utf-8')}
async function cUploadV(){
  if(!csvVendas.length)return;
  tst('Importando '+csvVendas.length+' vendas...');
  // Importar em lotes de 100
  for(var i=0;i<csvVendas.length;i+=100){
    var batch=csvVendas.slice(i,i+100);
    var res=await db.from('vendas').insert(batch);
    if(res.error){tst('Erro no lote '+(i/100+1)+': '+res.error.message);return}
  }
  cm();tst(csvVendas.length+' vendas importadas!');csvVendas=[];await ldVendas();rHome();
}

// ==================== COMPARATIVO MENSAL ====================
function pgComp(){
  var h='<div class="st">📊 Comparativo Mensal</div><p style="font-size:12px;color:var(--g500);margin-bottom:16px">O que fizemos em cada mês e qual foi o resultado — para entender e replicar o que funciona</p>';
  var months={};
  allVendas.forEach(function(v){if(!v.data_contrato)return;var m=v.data_contrato.substring(0,7);if(!months[m])months[m]={vendas:0,receita:0,emails:0,reels:0,stories:0,features:[],campanhas:[],ocorrencias:[]};months[m].vendas++;months[m].receita+=Number(v.valor_assinatura||0)});
  allEms.forEach(function(e){if(!e.data_envio)return;var m=e.data_envio.substring(0,7);if(!months[m])months[m]={vendas:0,receita:0,emails:0,reels:0,stories:0,features:[],campanhas:[],ocorrencias:[]};months[m].emails++});
  allSocs.forEach(function(s){if(!s.data_publicacao)return;var m=s.data_publicacao.substring(0,7);if(!months[m])months[m]={vendas:0,receita:0,emails:0,reels:0,stories:0,features:[],campanhas:[],ocorrencias:[]};if(s.tipo==='reel')months[m].reels++;else months[m].stories++});
  feats.forEach(function(f){if(!f.data_lancamento)return;var m=f.data_lancamento.substring(0,7);if(!months[m])months[m]={vendas:0,receita:0,emails:0,reels:0,stories:0,features:[],campanhas:[],ocorrencias:[]};months[m].features.push(f.nome+(f.versao?' v'+f.versao:''))});
  camps.forEach(function(c){if(!c.data_inicio)return;var m=c.data_inicio.substring(0,7);if(!months[m])months[m]={vendas:0,receita:0,emails:0,reels:0,stories:0,features:[],campanhas:[],ocorrencias:[]};months[m].campanhas.push(c.nome)});
  ocors.forEach(function(o){var m=o.data_inicio.substring(0,7);if(!months[m])months[m]={vendas:0,receita:0,emails:0,reels:0,stories:0,features:[],campanhas:[],ocorrencias:[]};var imp={positivo:'🟢',negativo:'🔴',neutro:'🔵'}[o.impacto]||'🔵';months[m].ocorrencias.push(imp+' '+o.titulo)});
  var sm=Object.keys(months).sort(function(a,b){return b.localeCompare(a)}).slice(0,12);
  if(!sm.length)return h+'<div class="card emp"><span class="icon">compare_arrows</span><p>Nenhum dado</p></div>';
  var mn=['','Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  // Encontrar melhor mês
  var bestM='',bestV=0;sm.forEach(function(m){if((months[m]?.vendas||0)>bestV){bestV=months[m].vendas;bestM=m}});
  // Cards por mês (vertical, não tabela)
  sm.forEach(function(m){
    var d=months[m];var p=m.split('-');var mLabel=mn[parseInt(p[1])]+' '+p[0];
    var isBest=m===bestM&&sm.length>1&&d.vendas>0;
    h+='<div class="card" style="padding:20px;margin-bottom:12px;border-left:4px solid '+(isBest?'var(--ok)':'var(--g300)')+(isBest?';background:var(--okbg)':'')+'"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div style="display:flex;align-items:center;gap:8px"><span style="font-size:16px;font-weight:700;color:var(--navy);font-family:Poppins,sans-serif">'+mLabel+'</span>'+(isBest?'<span class="badge b-ok">🏆 Melhor mês</span>':'')+'</div><div style="display:flex;gap:16px;align-items:baseline"><div style="text-align:center"><div style="font-size:24px;font-weight:700;color:var(--em)">'+d.vendas+'</div><div style="font-size:10px;color:var(--g500)">vendas</div></div><div style="text-align:center"><div style="font-size:18px;font-weight:700;color:var(--ok)">R$ '+fmtBR(d.receita)+'</div><div style="font-size:10px;color:var(--g500)">receita</div></div></div></div>';
    // O que fez
    h+='<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px">';
    if(d.campanhas.length)d.campanhas.forEach(function(c){h+='<span style="font-size:10px;padding:3px 8px;border-radius:4px;background:var(--cl);color:var(--navy);font-weight:600">📢 '+c+'</span>'});
    if(d.emails)h+='<span style="font-size:10px;padding:3px 8px;border-radius:4px;background:var(--infobg);color:var(--info);font-weight:600">📧 '+d.emails+' e-mail(s)</span>';
    if(d.reels)h+='<span style="font-size:10px;padding:3px 8px;border-radius:4px;background:#FDF2F8;color:var(--pink);font-weight:600">🎬 '+d.reels+' reel(s)</span>';
    if(d.stories)h+='<span style="font-size:10px;padding:3px 8px;border-radius:4px;background:#F5F3FF;color:var(--purp);font-weight:600">📱 '+d.stories+' story(ies)</span>';
    if(d.features.length)d.features.forEach(function(f){h+='<span style="font-size:10px;padding:3px 8px;border-radius:4px;background:var(--okbg);color:var(--ok);font-weight:600">🚀 '+f+'</span>'});
    if(!d.campanhas.length&&!d.emails&&!d.reels&&!d.stories&&!d.features.length)h+='<span style="font-size:10px;color:var(--g500);font-style:italic">Nenhuma ação registrada</span>';
    h+='</div>';
    // Ocorrências
    if(d.ocorrencias.length){h+='<div style="margin-top:4px;font-size:10px;color:var(--g700)">';d.ocorrencias.forEach(function(o){h+='<span style="display:inline-block;margin-right:12px">'+o+'</span>'});h+='</div>'}
    h+='</div>';
  });
  // Gráfico
  h+='<div class="card" style="padding:20px;margin-top:4px"><div class="st" style="margin:0 0 12px">📈 Ações × Vendas</div><canvas id="ch-comp" height="280"></canvas></div>';
  setTimeout(function(){
    var sms=sm.slice().reverse();var cx=document.getElementById('ch-comp');
    if(cx&&sms.length)new Chart(cx,{type:'bar',data:{labels:sms.map(function(m){var p=m.split('-');return mn[parseInt(p[1])]+'/'+p[0].slice(2)}),datasets:[
      {label:'Vendas',data:sms.map(function(m){return months[m]?.vendas||0}),backgroundColor:'rgba(5,150,105,0.8)',borderRadius:4},
      {label:'E-mails',data:sms.map(function(m){return months[m]?.emails||0}),backgroundColor:'rgba(37,99,235,0.5)',borderRadius:4},
      {label:'Reels',data:sms.map(function(m){return months[m]?.reels||0}),backgroundColor:'rgba(219,39,119,0.5)',borderRadius:4}
    ]},options:{responsive:true,plugins:{legend:{position:'bottom'}},scales:{y:{beginAtZero:true}}}});
  },100);
  return h;
}

// ==================== DASHBOARD ====================
function pgDash(){
  var now=new Date();var curM=now.toISOString().substring(0,7);
  var selM=document.getElementById('dash-m')?.value||curM;
  var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px"><div class="st" style="margin:0">🏠 Dashboard</div><div><input type="month" id="dash-m" value="'+selM+'" onchange="rHome()" style="width:auto;padding:5px 10px;font-size:12px;border-radius:6px;border:1px solid var(--g300)"></div></div>';
  var mS=selM+'-01',mE=selM+'-31';
  // Vendas mês atual
  var mV=allVendas.filter(function(v){return v.data_contrato>=mS&&v.data_contrato<=mE});
  var mRc=mV.reduce(function(a,v){return a+Number(v.valor_assinatura||0)},0);
  var ticket=mV.length>0?(mRc/mV.length):0;
  // Vendas mês anterior (para tendência)
  var pm=prevMonth(selM);var pmS=pm+'-01',pmE=pm+'-31';
  var pmV=allVendas.filter(function(v){return v.data_contrato>=pmS&&v.data_contrato<=pmE});
  var pmRc=pmV.reduce(function(a,v){return a+Number(v.valor_assinatura||0)},0);
  var pmTicket=pmV.length>0?(pmRc/pmV.length):0;
  // Tendências
  var tVendas=tendencia(mV.length,pmV.length);
  var tReceita=tendencia(mRc,pmRc);
  var tTicket=tendencia(ticket,pmTicket);
  // KPIs com tendência
  h+='<div class="kg">';
  h+='<div class="card kpi" style="border-top-color:var(--em)"><div class="kl">🆕 Vendas</div><div class="kv">'+mV.length+'</div><div class="ks" style="color:'+tVendas.c+'">'+tVendas.t+'</div></div>';
  h+='<div class="card kpi" style="border-top-color:var(--ok)"><div class="kl">💵 Receita</div><div class="kv">R$ '+fmtBR(mRc)+'</div><div class="ks" style="color:'+tReceita.c+'">'+tReceita.t+'</div></div>';
  h+='<div class="card kpi" style="border-top-color:var(--purp)"><div class="kl">💰 Ticket Médio</div><div class="kv">R$ '+fmtBR(ticket)+'</div><div class="ks" style="color:'+tTicket.c+'">'+tTicket.t+'</div></div>';
  h+='</div>';
  // Gráfico por Origem + Evolução
  h+='<div class="g2" style="margin-top:20px">';
  h+='<div class="card" style="padding:20px"><div class="st" style="margin:0 0 12px">📊 Vendas por Origem</div><canvas id="dash-orig" height="220"></canvas>';
  if(!mV.length)h+='<p style="font-size:12px;color:var(--g500);text-align:center;padding:16px">Nenhuma venda no período</p>';
  h+='</div>';
  h+='<div class="card" style="padding:20px"><div class="st" style="margin:0 0 12px">📈 Evolução Mensal</div><canvas id="dash-evo" height="220"></canvas></div>';
  h+='</div>';
  // Destaques do mês
  h+='<div class="card" style="padding:20px;margin-top:16px"><div class="st" style="margin:0 0 12px">🏆 Destaques do Mês</div>';
  h+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px">';
  // Melhor e-mail
  var mEms=allEms.filter(function(e){return e.data_envio&&e.data_envio>=mS&&e.data_envio<=mE&&e.enviados>0});
  if(mEms.length){var be=mEms.reduce(function(a,b){return(b.aberturas/b.enviados)>(a.aberturas/a.enviados)?b:a});h+='<div style="padding:12px;border:1px solid var(--g200);border-radius:8px;border-left:3px solid var(--cyan)"><div style="font-size:10px;color:var(--g500);font-weight:600;margin-bottom:4px">📧 Melhor E-mail</div><div style="font-size:13px;font-weight:600;color:var(--navy)">'+be.nome+'</div><div style="font-size:11px;color:var(--cyan);font-weight:600;margin-top:2px">'+P(be.aberturas,be.enviados)+'% abertura · '+F(be.vendas||0)+' vendas</div></div>'}
  else{h+='<div style="padding:12px;border:1px solid var(--g200);border-radius:8px"><div style="font-size:10px;color:var(--g500)">📧 Nenhum e-mail no mês</div></div>'}
  // Melhor reel
  var mR=allSocs.filter(function(s){return s.tipo==='reel'&&s.data_publicacao>=mS&&s.data_publicacao<=mE&&s.alcance>0});
  if(mR.length){var br=mR.reduce(function(a,b){return engRate(b)>engRate(a)?b:a});h+='<div style="padding:12px;border:1px solid var(--g200);border-radius:8px;border-left:3px solid var(--pink)"><div style="font-size:10px;color:var(--g500);font-weight:600;margin-bottom:4px">🎬 Melhor Reel</div><div style="font-size:13px;font-weight:600;color:var(--navy)">'+br.nome+'</div><div style="font-size:11px;color:var(--pink);font-weight:600;margin-top:2px">'+engRate(br).toFixed(1)+'% engaj. · '+F(br.alcance)+' alcance</div></div>'}
  else{h+='<div style="padding:12px;border:1px solid var(--g200);border-radius:8px"><div style="font-size:10px;color:var(--g500)">🎬 Nenhum reel no mês</div></div>'}
  // Melhor story
  var mSt=allSocs.filter(function(s){return s.tipo==='story'&&s.data_publicacao>=mS&&s.data_publicacao<=mE&&s.alcance>0});
  if(mSt.length){var bs=mSt.reduce(function(a,b){return engRate(b)>engRate(a)?b:a});h+='<div style="padding:12px;border:1px solid var(--g200);border-radius:8px;border-left:3px solid var(--purp)"><div style="font-size:10px;color:var(--g500);font-weight:600;margin-bottom:4px">📱 Melhor Story</div><div style="font-size:13px;font-weight:600;color:var(--navy)">'+bs.nome+'</div><div style="font-size:11px;color:var(--purp);font-weight:600;margin-top:2px">'+engRate(bs).toFixed(1)+'% engaj.</div></div>'}
  else{h+='<div style="padding:12px;border:1px solid var(--g200);border-radius:8px"><div style="font-size:10px;color:var(--g500)">📱 Nenhum story no mês</div></div>'}
  // Feature lançada
  var mF=feats.filter(function(f){return f.data_lancamento&&f.data_lancamento>=mS&&f.data_lancamento<=mE});
  if(mF.length){mF.forEach(function(f){h+='<div style="padding:12px;border:1px solid var(--g200);border-radius:8px;border-left:3px solid var(--ok)"><div style="font-size:10px;color:var(--g500);font-weight:600;margin-bottom:4px">🚀 Feature</div><div style="font-size:13px;font-weight:600;color:var(--navy)">'+f.nome+'</div><div style="font-size:11px;color:var(--ok);font-weight:600;margin-top:2px">'+(f.versao?'v'+f.versao+' · ':'')+(f.data_lancamento||'')+'</div></div>'})}
  else{h+='<div style="padding:12px;border:1px solid var(--g200);border-radius:8px"><div style="font-size:10px;color:var(--g500)">🚀 Nenhuma feature no mês</div></div>'}
  h+='</div></div>';
  // Correlação rápida
  h+='<div class="card" style="padding:20px;margin-top:16px"><div class="st" style="margin:0 0 12px">🔗 Correlação: Ações × Vendas</div>';
  h+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px">';
  var corr=calcCorr();
  [{l:'📧 Meses com e-mail',com:corr.emCom,sem:corr.emSem,c:'var(--cyan)'},{l:'🎬 Meses com reel',com:corr.rlCom,sem:corr.rlSem,c:'var(--pink)'},{l:'📱 Meses com story',com:corr.stCom,sem:corr.stSem,c:'var(--purp)'},{l:'🚀 Meses com feature',com:corr.ftCom,sem:corr.ftSem,c:'var(--ok)'}].forEach(function(x){
    var diff=x.sem>0?((x.com-x.sem)/x.sem*100).toFixed(0):'—';
    h+='<div style="padding:12px;border:1px solid var(--g200);border-radius:8px"><div style="font-size:11px;color:var(--g500);font-weight:600;margin-bottom:6px">'+x.l+'</div><div style="display:flex;justify-content:space-between;align-items:baseline"><div><div style="font-size:20px;font-weight:700;color:'+x.c+'">'+x.com.toFixed(0)+'</div><div style="font-size:10px;color:var(--g500)">média vendas</div></div><div style="text-align:center;font-size:11px;color:var(--g500)">vs</div><div style="text-align:right"><div style="font-size:20px;font-weight:700;color:var(--g700)">'+x.sem.toFixed(0)+'</div><div style="font-size:10px;color:var(--g500)">sem ação</div></div></div>'+(diff!=='—'?'<div style="font-size:11px;font-weight:600;color:'+(parseFloat(diff)>0?'var(--ok)':'var(--err)')+';margin-top:6px;text-align:center">'+(parseFloat(diff)>0?'↑':'↓')+' '+Math.abs(parseFloat(diff))+'%</div>':'')+'</div>';
  });
  h+='</div></div>';
  return h;
}

// Helpers do Dashboard
function fmtBR(n){return n.toFixed(2).replace('.',',')}
function prevMonth(ym){var p=ym.split('-');var y=parseInt(p[0]),m=parseInt(p[1])-1;if(m<1){m=12;y--}return y+'-'+String(m).padStart(2,'0')}
function tendencia(atual,anterior){if(anterior===0)return{t:atual>0?'Novo':'—',c:'var(--g500)'};var pct=((atual-anterior)/anterior*100).toFixed(0);if(pct>0)return{t:'↑ '+pct+'% vs mês ant.',c:'var(--ok)'};if(pct<0)return{t:'↓ '+Math.abs(pct)+'% vs mês ant.',c:'var(--err)'};return{t:'= igual ao mês ant.',c:'var(--g500)'}}
function engRate(s){return s.alcance>0?((s.curtidas+s.comentarios+s.compartilhamentos+s.salvamentos)/s.alcance*100):0}
function calcCorr(){
  var mm={};
  allVendas.forEach(function(v){if(!v.data_contrato)return;var m=v.data_contrato.substring(0,7);mm[m]=(mm[m]||0)+1});
  var emM={};allEms.forEach(function(e){if(e.data_envio)emM[e.data_envio.substring(0,7)]=true});
  var rlM={};allSocs.forEach(function(s){if(s.tipo==='reel'&&s.data_publicacao)rlM[s.data_publicacao.substring(0,7)]=true});
  var stM={};allSocs.forEach(function(s){if(s.tipo==='story'&&s.data_publicacao)stM[s.data_publicacao.substring(0,7)]=true});
  var ftM={};feats.forEach(function(f){if(f.data_lancamento)ftM[f.data_lancamento.substring(0,7)]=true});
  function avg(months,flagMap,has){var vals=Object.entries(months).filter(function(e){return has?flagMap[e[0]]:!flagMap[e[0]]}).map(function(e){return e[1]});return vals.length>0?vals.reduce(function(a,b){return a+b},0)/vals.length:0}
  return{emCom:avg(mm,emM,true),emSem:avg(mm,emM,false),rlCom:avg(mm,rlM,true),rlSem:avg(mm,rlM,false),stCom:avg(mm,stM,true),stSem:avg(mm,stM,false),ftCom:avg(mm,ftM,true),ftSem:avg(mm,ftM,false)};
}

function chDash(){
  var selM=document.getElementById('dash-m')?.value||(new Date().toISOString().substring(0,7));
  var mS=selM+'-01',mE=selM+'-31';
  var mV=allVendas.filter(function(v){return v.data_contrato>=mS&&v.data_contrato<=mE});
  // Donut por origem
  var po={};mV.forEach(function(v){var o=v.origem||'Não identificado';po[o]=(po[o]||0)+1});
  var colors=['#2563EB','#16A34A','#DB2777','#7C3AED','#EA580C','#45E5E5','#FFB800','#666','#10293F','#DC2626'];
  var cx=document.getElementById('dash-orig');
  if(cx&&Object.keys(po).length)new Chart(cx,{type:'doughnut',data:{labels:Object.keys(po),datasets:[{data:Object.values(po),backgroundColor:colors.slice(0,Object.keys(po).length),borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{size:10}}}}}});
  // Evolução
  var pm={};allVendas.forEach(function(v){if(!v.data_contrato)return;var m=v.data_contrato.substring(0,7);pm[m]=(pm[m]||0)+1});
  var ms=Object.keys(pm).sort().slice(-8);
  var mn=['','Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  var cx2=document.getElementById('dash-evo');
  if(cx2&&ms.length)new Chart(cx2,{type:'bar',data:{labels:ms.map(function(m){var p=m.split('-');return mn[parseInt(p[1])]+'/'+p[0].slice(2)}),datasets:[{label:'Vendas',data:ms.map(function(m){return pm[m]}),backgroundColor:'rgba(5,150,105,0.7)',borderRadius:4}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}});
}
</script>
